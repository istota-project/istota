resource_types = ["moneyman"]
cli = true

# Instance-level settings (from [moneyman] config section)
[[env]]
var = "MONEYMAN_CLI_PATH"
from = "config"
config_path = "moneyman.cli_path"

[[env]]
var = "MONEYMAN_CONFIG"
from = "config"
config_path = "moneyman.config_path"

[[env]]
var = "MONEYMAN_API_URL"
from = "config"
config_path = "moneyman.api_url"

[[env]]
var = "MONEYMAN_API_KEY"
from = "config"
config_path = "moneyman.api_key"

# Per-user setting (from user's [[resources]] entry)
[[env]]
var = "MONEYMAN_USER"
from = "user_resource_config"
resource_type = "moneyman"
field = "user_key"
