resource_types = ["moneyman"]
cli = true

# Local mode (same host): moneyman CLI path + user key
[[env]]
var = "MONEYMAN_CLI_PATH"
from = "user_resource_config"
resource_type = "moneyman"
field = "cli_path"

[[env]]
var = "MONEYMAN_USER"
from = "user_resource_config"
resource_type = "moneyman"
field = "user_key"

[[env]]
var = "MONEYMAN_CONFIG"
from = "user_resource_config"
resource_type = "moneyman"
field = "config_path"

# Remote mode (different host): HTTP URL + API key
[[env]]
var = "MONEYMAN_API_URL"
from = "user_resource_config"
resource_type = "moneyman"
field = "base_url"

[[env]]
var = "MONEYMAN_API_KEY"
from = "user_resource_config"
resource_type = "moneyman"
field = "api_key"
