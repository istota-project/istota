# Istota configuration

# The name your bot uses in chat, emails, and folder names.
# Change this to whatever you want to call your assistant.
bot_name = "Istota"

# Include emissaries.md (constitutional principles) in system prompts (default: true)
# emissaries_enabled = true

# =============================================================================
# Model selection — three knobs that interact
# =============================================================================
# `model` + `effort` set the *default* for every task (cron, briefings, talk,
# email, ...). Both fields are read independently — see footgun below.
# `[models.roles]` (further down) rebinds role aliases like smart/general/fast.
#
# Resolution chain:
#   1. Per-task overrides — `!model <alias> <prompt>` from Talk wins, both
#      model and effort stored on the task row.
#   2. Otherwise — top-level `model` + `effort` here.
#   3. Otherwise — brain default.
#
# FOOTGUN — provider aliases like "opus-46-high" encode model AND effort
# only when used via the Talk `!model` prefix. In this top-level config,
# `model = "opus-46-high"` resolves the model to claude-opus-4-6 but leaves
# `effort` empty (= medium default). To pin Opus 4.6 + high effort as the
# *global* default you must set BOTH:
#   model = "opus-46-high"   (or equivalently "claude-opus-4-6")
#   effort = "high"
# =============================================================================

# Model to use. Accepts:
#   - canonical IDs    "claude-opus-4-8", "claude-opus-4-7", "claude-sonnet-4-6"
#   - provider aliases "opus", "opus-high", "opus-47-high", "sonnet", "haiku"
#   - role aliases     "smart", "general", "fast", or any custom role from
#                      [models.roles] below
# Bare aliases ("opus", "sonnet") float to the current latest version each
# release; canonical IDs are immutable. Pin to a versioned ID for stability.
# Empty or omitted = brain default.
# model = "claude-opus-4-8"

# Effort level: low, medium, high, xhigh, max. Support varies by model.
# Opus 4.8 defaults to high on all surfaces. Other models may differ.
# Read independently of `model` — see footgun above.
# Empty or omitted = model default.
# effort = "high"

# Use config/system-prompt.md instead of Claude Code's default system prompt.
# The custom prompt is minimal, focused on tool usage and working practices.
# custom_system_prompt = true

# Database path (relative to working directory or absolute)
db_path = "data/istota.db"

# Local-disk root for per-user module SQLite DBs (feeds/health/location/money).
# These MUST live on local disk, NOT the Nextcloud mount: WAL's mmap'd -shm file
# SIGBUSes the process on the rclone FUSE mount, so they'd be stuck on the
# slower DELETE journal mode (no reader/writer concurrency). User-facing files
# (health uploads, money ledgers, feeds exports) stay on the mount; only the
# .db relocates here. A path under nextcloud_mount_path is refused at runtime.
module_data_dir = "data/modules"

# =============================================================================
# File Access Configuration
# =============================================================================
# Choose ONE of the following options:

# Option 1: rclone CLI (default, works without systemd mount)
# Uses subprocess calls to rclone for each file operation
rclone_remote = "nextcloud"

# Option 2: Local mount (faster, requires mount-nextcloud.service)
# Uncomment to enable - all Nextcloud files accessible as local paths
# nextcloud_mount_path = "/srv/mount/nextcloud/content"

# Path to skills directory (individual skill files loaded selectively)
skills_dir = "config/skills"

# Skills to exclude from selection (instance-wide)
# disabled_skills = ["browse", "whisper"]

# Temporary directory for task execution
temp_dir = "/tmp/istota"

# Experimental feature flags — operator opt-in for rough features that ship
# in the tree but are off by default. See docs/EXPERIMENTAL.md for the
# registry and graduation policy. Run `uv run istota experimental list` to
# see what's gateable on this build. Unknown names log a warning at
# startup. Not exposed in the web UI, not per-user.
[experimental]
# features = ["money_tax", "money_wash_sales"]
features = []

# Brain — selects the model-invocation backend. Three kinds coexist behind the
# same protocol (src/istota/brain/), so swapping backends doesn't touch executor
# orchestration (memory, skills, sandbox, etc.):
#   "claude_code" (default) — wraps the headless `claude -p` CLI subprocess.
#   "native"                — istota's own in-process agent loop against an
#                             OpenAI-compatible (or Claude-CLI) provider.
#   "tmux_claude"           — drives the interactive `claude` TUI in a detached
#                             tmux session (keeps traffic on subscription
#                             billing). Full instance switch; claude_code stays
#                             the automatic fallback + circuit breaker.
# [brain]
# kind = "claude_code"
#
# Native-brain settings (only used when kind = "native", or via a routing
# override below). The API key stays out of this file — set it via the
# ISTOTA_BRAIN_NATIVE_API_KEY env override.
# [brain.native]
# provider = "openai_compat"                 # only provider currently
# model = "claude-sonnet-4-6"                # explicit id for openai_compat
# effort = ""                                # default effort: low/medium/high/xhigh/max.
#                                            #   Sent as `reasoning_effort` only to a
#                                            #   thinking-capable model; xhigh/max fold
#                                            #   to high over the compat endpoint. Empty
#                                            #   = no reasoning_effort field. Per-task
#                                            #   effort (e.g. !model opus-high) overrides.
# base_url = "https://api.anthropic.com/v1"  # any OpenAI-compatible endpoint
# max_turns = 100                            # hard cap on assistant turns/task
# max_tokens = 16384                         # per-completion output cap
# prompt_caching = true                      # cache_control breakpoints. Omit to use the
#                                            #   default: ON for api.anthropic.com,
#                                            #   OFF for any other endpoint. Set explicitly
#                                            #   to force either way (a plain-OpenAI / local
#                                            #   endpoint that rejects cache_control needs
#                                            #   `false`).
#
# Tmux-driven interactive-TUI brain (only used when kind = "tmux_claude", or via
# a routing override below). All fields default in code to the prototype's pinned
# values, so an empty/absent block is behavioral parity. The marker lists are
# pane-text heuristics pinned to a claude CLI version — a CLI reword that breaks
# readiness detection is a config hotfix (override the relevant marker), not a
# code release.
# [brain.tmux]
# fallback_trip_threshold = 5       # consecutive launch failures before the circuit opens
# fallback_cooldown_seconds = 300   # how long the circuit stays open (headless fallback)
# ready_timeout_seconds = 30        # REPL-ready deadline
# tmux_command_timeout = 10         # per-tmux-subprocess timeout
# cli_version_pin = "2.1.168"       # supported claude CLI; mismatch logs a WARNING
# ready_markers = ["bypass permissions on", "? for shortcuts", "for shortcuts"]
# trust_markers = ["trust this folder", "Is this a project you"]
# theme_markers = ["Choose the text style", "run /theme"]   # first-run theme picker
# bypass_warning_marker = "Bypass Permissions mode"
# bypass_accept_marker = "Yes, I accept"
# error_markers = ["API Error", "session limit reached", "Context low"]
#
# Per-source-type brain routing (gradual rollout): map a task's source_type to
# a brain kind, overriding `kind` for matching tasks. Lets cron/heartbeat run on
# the native brain while interactive talk/email stays on claude_code. Unknown
# kinds are ignored (logged), never wedging a task.
# [brain.source_type_overrides]
# scheduled = "native"
# heartbeat = "native"

# ============================================================================
# Security Hardening
# ============================================================================
# Claude subprocess runs with a clean minimal environment and --allowedTools
# whitelist. Credentials are injected per-task and optionally routed through
# the skill proxy (enabled by default) for credential isolation.
# Secrets can be provided via env vars (e.g. from systemd EnvironmentFile=).
# Naming convention: ISTOTA_<SECTION>_<FIELD>, matching the config dataclass path.
#   ISTOTA_NEXTCLOUD_APP_PASSWORD, ISTOTA_EMAIL_IMAP_PASSWORD, ISTOTA_EMAIL_SMTP_PASSWORD,
#   ISTOTA_DEVELOPER_GITLAB_TOKEN, ISTOTA_DEVELOPER_GITHUB_TOKEN

# [security]
# sandbox_enabled = true           # bwrap filesystem isolation per user (Linux only)
# sandbox_admin_db_write = false   # allow admin DB writes inside sandbox
# skill_proxy_enabled = true       # proxy skill CLI calls via Unix socket (credential isolation)
# skill_proxy_timeout = 300        # timeout for proxied skill commands (seconds)
# passthrough_env_vars = ["LANG", "LC_ALL", "LC_CTYPE", "TZ"]
# sandbox_ro_paths = ["/srv/app"]  # extra RO bind-mounts in sandbox

# [security.network]
# enabled = true                   # --unshare-net + CONNECT proxy (requires sandbox)
# allow_pypi = true                # add pypi.org + files.pythonhosted.org to allowlist
# extra_hosts = []                 # operator-specific additions (e.g. ["registry.example.com:443"])

[nextcloud]
# Nextcloud server URL
url = "https://nextcloud.example.com"
# Bot's Nextcloud username
username = "istota"
# App password (generate in Nextcloud: Settings > Security > Devices & sessions)
# Note: CalDAV settings are derived from these values automatically
# CalDAV URL = {url}/remote.php/dav, using same username/app_password
app_password = "xxxxx-xxxxx-xxxxx-xxxxx-xxxxx"

[talk]
# Enable Talk polling (requires istota user to be added to conversations)
enabled = true
# Bot's Nextcloud username (to filter its own messages)
bot_username = "istota"

[email]
# Enable email functionality (requires himalaya to be installed)
enabled = true
# IMAP settings (for receiving)
imap_host = "imap.example.com"
imap_port = 993
imap_user = "istota@example.com"
imap_password = "app-password-here"
# SMTP settings (for sending) - defaults to IMAP credentials if not set
smtp_host = "smtp.example.com"
smtp_port = 587
# smtp_user = ""  # uses imap_user if empty
# smtp_password = ""  # uses imap_password if empty
# Polling settings
poll_folder = "INBOX"
bot_email = "istota@example.com"  # bot's email address (to skip own messages)

[conversation]
# Enable conversation context (uses Sonnet to select relevant previous messages)
enabled = true
# Number of recent messages to consider
lookback_count = 25
# Include all messages without selection if history <= this threshold (faster for short threads)
skip_selection_threshold = 3
# Model for selecting relevant context. Accepts canonical IDs ("claude-haiku-4-5"),
# provider aliases ("haiku"), or role aliases ("fast" — default; resolves to
# Haiku via brain.claude_code.DEFAULT_ROLE_TARGETS, operator-overridable via
# [models.roles] below).
selection_model = "fast"
# Timeout for context selection
selection_timeout = 30.0
# Set to false to include all lookback messages without LLM selection (useful for testing)
use_selection = true
# Always include this many recent messages without selection (rest triaged by model)
always_include_recent = 5
# Max chars per bot response in conversation context (0 to disable truncation)
context_truncation = 0
# Number of recent unfiltered tasks to inject into context (ensures scheduled/briefing
# messages aren't orphaned when the user replies to them)
previous_tasks_count = 3
# Messages to fetch from Talk API for context (max 200, default 100)
# Talk API-based context shows all participants' messages, not just bot interactions
talk_context_limit = 100

[logging]
# Log level: INFO (default) or DEBUG (verbose)
level = "INFO"
# Output destination: console, file, or both
output = "console"
# Log file path (when output includes "file")
# file = "/var/log/istota/istota.log"
# rotate = true
# max_size_mb = 10
# backup_count = 5

[scheduler]
# Seconds between checking for new tasks in the queue
poll_interval = 5
# Seconds between pending-task dispatch scans within a single poll tick. The
# periodic checks (briefings, email, heartbeat, …) stay on poll_interval; only
# the cheap pending-task scan runs at this finer cadence, so a freshly-enqueued
# task (e.g. a web chat message) is claimed within dispatch_interval instead of
# waiting up to a full poll_interval. Set to 0 or >= poll_interval for the
# legacy "one dispatch per poll tick" behaviour.
dispatch_interval = 0.5
# Seconds between polling Talk conversations
talk_poll_interval = 10
# Long-poll timeout for Talk API (server-side wait)
talk_poll_timeout = 30
# Max seconds to wait for all rooms before processing available results
# Rooms that respond faster (with new messages) are processed immediately;
# quiet rooms still long-polling are cancelled and re-polled next cycle
talk_poll_wait = 2.0
# Seconds between polling for new emails
email_poll_interval = 60
# Seconds between checking for briefings to run
briefing_check_interval = 60
# Seconds between polling TASKS.md files for new tasks
tasks_file_poll_interval = 30
# Seconds between scheduler_stats health-line emits (threads / fds / rss /
# running-tasks / active-workers). One key=value INFO line per interval on the
# istota.scheduler.stats logger — grep it in journalctl to catch resource leaks
# early. 0 disables the emit.
scheduler_stats_interval = 60

# Defense-in-depth: alert an operator if the single-threaded main dispatch loop
# stops ticking for this many seconds (a slow call that slipped onto the loop
# thread, a wedged check). A separate watchdog thread logs an ERROR and fires
# one alert, then re-arms when the loop recovers. 0 disables it.
loop_stall_alert_seconds = 180

# Progress / event streaming.
# Every task produces a typed, persisted event stream (the task_events table)
# consumed by all output surfaces: web chat SSE, Talk, push, log channel, admin.
# When enabled, Talk shows real-time tool progress as Claude works.
progress_updates = true
# Emit tool_start / tool_end events (the Talk ack edit + log channel use these).
progress_show_tool_use = true
# Emit intermediate assistant text events (can be noisy, off by default).
progress_show_text = false
# Write events to the task_events table. Operational kill-switch — when false,
# in-process consumers (Talk/log/push) still work but SSE/admin have nothing to read.
event_log_enabled = true
# Narration gate / substance bar for streamed answer text on stream surfaces
# (web chat / REPL). A text run streams nothing until it crosses this many
# characters without an intervening tool call. At a tool boundary a short
# lead-in ("Let me check…") that stayed under it is dropped; a substantial block
# that crossed it is kept (the web chat renders it as its own block rather than
# folding it into the activity chip). Higher = more pre-tool text folds away but
# short answers animate less (they still arrive whole via the final result);
# lower = more intermediate text is shown live. Keep equal to the web client's
# SUBSTANTIAL_TEXT_CHARS. 0 disables the gate. Watch the `stream_gate:` logs to
# tune.
stream_text_gate_chars = 280
# A push notification fires only when a task ran longer than this (short tasks
# don't need a ping — the user is likely still watching).
push_notification_threshold_seconds = 30
# Which task source_types trigger a push notification on completion. Empty by
# default: ntfy is opt-in, never a default surface. ntfy still fires for
# explicit requests (scheduled jobs with output_target=ntfy, heartbeat alerts).
# Add source_types here (e.g. ["talk"]) to opt back into completion pushes.
push_notification_sources = []

# Kill task execution after N minutes (default: 30)
task_timeout_minutes = 30
# Include selected skills in log channel messages (default: true)
log_channel_show_skills = true
# Robustness settings
# Auto-cancel tasks awaiting confirmation after N minutes (default: 120 = 2 hours)
confirmation_timeout_minutes = 120
# Log warnings for tasks pending longer than N minutes (default: 30)
stale_pending_warn_minutes = 30
# Auto-fail tasks pending longer than N hours (default: 24 = 1 day)
stale_pending_fail_hours = 24
# How often a running worker pings liveness, in seconds (default: 60; 0 disables).
# Reclaim uses this heartbeat to tell a slow-but-alive worker from a dead one.
worker_heartbeat_seconds = 60
# Reclaim a heartbeating worker's task after this many minutes of heartbeat
# silence (default: 10). Independent of task_timeout_minutes. Higher = fewer
# false-dead reclaims of a slow-but-alive worker (which would re-run the task),
# at the cost of slower recovery after a genuine worker crash.
worker_stuck_minutes = 10
# Delete completed/failed/cancelled tasks older than N days (default: 7)
task_retention_days = 7
# Delete emails older than N days from IMAP inbox (default: 7, 0 to disable)
email_retention_days = 7
# Max cached talk messages per conversation (default: 200)
talk_cache_max_per_conversation = 200

# Deferred subtask creation limits (defense against prompt-injection-driven fan-out).
# Subtasks are created when an admin task writes a deferred JSON request; these caps
# bound how much damage a single injected task can do.
# Max subtasks created per parent task (default: 10)
max_subtasks_per_task = 10
# Max chain depth — a task at depth N cannot spawn further subtasks when N >= max
# (default: 3, set to 0 to disable). With max=3 a chain like talk → subtask → subtask
# → subtask is allowed but no deeper.
max_subtask_depth = 3
# Skip deferred subtasks whose prompt exceeds this size in chars (default: 8000, 0 = unlimited)
max_subtask_prompt_chars = 8000

# Per-user worker pool settings
# Maximum concurrent foreground (interactive) worker threads
max_foreground_workers = 5
# Maximum concurrent background (scheduled/briefing) worker threads
max_background_workers = 3
# Global per-user worker defaults (individual users can override in their config)
# user_max_foreground_workers = 2
# user_max_background_workers = 1
# Cumulative-idle seconds a worker lingers (re-checking for new work on a fine
# cadence) before exiting. A follow-up task arriving inside this window is
# claimed within one worker_idle_poll_interval instead of waiting a full
# poll_interval.
worker_idle_timeout = 10
# Idle re-check cadence (seconds). While a worker lingers it polls for a new
# pending task every worker_idle_poll_interval, so a quick follow-up message is
# picked up sub-second. Set to 0 or >= worker_idle_timeout to restore the legacy
# single coarse wait + single recheck.
worker_idle_poll_interval = 0.5
# Busy-timeout (ms) for the main dispatch loop's read-only scans. A DB locked
# past this budget makes the loop skip the tick (it re-dispatches ~0.5s later)
# instead of blocking up to 30s and tripping the stall watchdog. 0 keeps the
# 30s default. Defense-in-depth on top of WAL — leave at 2000 unless you have a
# reason to change it.
main_loop_read_timeout_ms = 2000
# Snapshot local DBs (framework + per-user modules) to the Nextcloud mount for
# off-host durability — they left the Nextcloud-synced workspaces when they
# moved to local disk. Uses SQLite's online backup API (consistent live copy).
db_backup_enabled = true
db_backup_interval = 86400          # seconds between snapshots (daily)
# db_backup_dir = ""                # empty = {nextcloud_mount}/istota-db-backups

# ============================================================================
# Briefing Defaults
# ============================================================================
# Admin-level defaults for briefing components. When a user sets
# `markets = true` or `news = true` in their workspace BRIEFINGS.md,
# these defaults are expanded into the full component config.

# [briefing_defaults.markets]
# Not needed — futures/indices symbols default from markets.py
# Only add if you want to override the built-in symbols:
# futures = ["ES=F", "NQ=F", "YM=F"]
# indices = ["^GSPC", "^IXIC", "^DJI"]

[briefing_defaults.news]
lookback_hours = 12
sources = [
    { type = "domain", value = "semafor.com" },
    { type = "email", value = "briefing@nytimes.com" },
]

[briefing_defaults.headlines]
sources = ["ap", "reuters", "guardian", "ft", "aljazeera", "lemonde", "spiegel"]

# ============================================================================
# Skills (routing)
# ============================================================================
# Skill routing is single-axis and has no configuration. A skill is either
# eager — selected deterministically (always_include / source_types / file_types
# / sticky / companions), full body in the prompt — or in the on-demand menu, a
# one-line entry the model loads in full via `istota-skill skills show <name>`.
# The menu is the full eligible catalogue minus the eager set, so the model
# self-selects any tool on demand while the prompt stays small. The former
# `[skills]` block (progressive_disclosure / auto_lazy_threshold_chars /
# always_eager) was removed; a stale block is ignored with a load-time warning.

# [playbooks]                          # Learned playbooks (procedural memory) — off by default
# enabled = false                      # master gate
# recall_limit = 3                     # top-K playbooks injected per task
# min_tool_calls = 4                   # a task must use >= this many tools to qualify
# retention_days = 0                   # 0 = keep forever; >0 = age-prune
# max_chars = 0                        # 0 = share the global max_memory_chars budget

# ============================================================================
# Model role aliases (operator override) — optional
# ============================================================================
# Roles are provider-agnostic names that internal call sites resolve through
# the active brain at runtime. Defaults (in code, brain.claude_code.DEFAULT_ROLE_TARGETS):
#   fast    → claude-haiku-4-5    (used by: context triage, skill classification)
#   general → claude-sonnet-4-6   (used by: sleep cycle extraction + USER.md curation)
#   smart   → claude-opus-4-8     (NOT used by internal code — exists for `!model smart`
#                                  from Talk and for any future code path that wants
#                                  "the best model")
#
# Rebind any role to a canonical ID, a provider alias from MODEL_ALIASES, or
# add a custom role name accessible via `!model <name>` from Talk.
#
# NOTE: role aliases never carry effort — `smart = "opus-46-high"` resolves
# `smart` to claude-opus-4-6 only; effort still tracks the top-level `effort`
# field (or the per-task override) unless the user types the provider alias
# directly via `!model opus-46-high <prompt>`.
#
# Example (uncomment to use):
# [models.roles]
# smart = "opus-47-high"   # rebind user-facing "smart" alias to Opus 4.7
# deep  = "opus-max"       # define a custom role for "deep thinking" tasks
# fast  = "haiku"          # explicit (matches default; cosmetic)

# ============================================================================
# Sleep Cycle (nightly memory extraction)
# ============================================================================
# Extracts long-term memories from completed tasks for each user nightly.
# Cron evaluated in each user's timezone (e.g., "0 2 * * *" = 2am local).
# Memories written to /Users/{user_id}/memories/YYYY-MM-DD.md.

# [sleep_cycle]
# enabled = true                       # enabled by default
# cron = "0 2 * * *"                  # 2am in user's timezone
# memory_retention_days = 0            # 0 = unlimited; >0 nightly deletes both dated memory FILES and
#                                      # ephemeral memory_chunks (conversation, memory_file, channel_memory)
#                                      # older than N days. Durable user_memory chunks are not swept.
# lookback_hours = 24                  # how far back to look for interactions
# auto_load_dated_days = 3             # auto-load N days of dated memories into prompts (0 = disabled)
# curate_user_memory = false           # nightly USER.md curation (op-based: append/add_heading/remove)
# curation_log_summary = true          # post one-line "USER.md curated: +N appended, ..." to user log_channel
# knowledge_graph_audit_retention_days = 365  # prune knowledge_facts_audit older than N days
#                                              # (independent of memory_retention_days so default
#                                              # deployments still prune; 0 = unlimited)

# ============================================================================
# Channel Sleep Cycle (shared channel memory extraction)
# ============================================================================
# Extracts shared memories from channel conversations nightly.
# Auto-discovers active channels — no explicit channel list needed.
# Cron evaluated in UTC since channels span users in different timezones.

# [channel_sleep_cycle]
# enabled = true                    # enabled by default
# cron = "0 3 * * *"               # 3am UTC (after user sleep cycles at 2am)
# lookback_hours = 24               # how far back to look for interactions
# memory_retention_days = 0           # 0 = unlimited; >0 nightly deletes dated channel memory files
#                                     # and channel_memory chunks older than N days

# ============================================================================
# Developer Skill (Git + GitLab/GitHub Workflows)
# ============================================================================
# Enables Claude Code to work in git repositories, create GitLab merge requests,
# and GitHub pull requests. Uses bare clones + git worktrees for branch isolation.
# Recommended: use dedicated bot accounts with minimal required permissions.

# [developer]
# enabled = false
# repos_dir = "/srv/repos"                          # base dir for clones + worktrees
#
# # GitLab settings
# gitlab_url = "https://gitlab.com"                 # GitLab instance URL
# gitlab_token = "glpat-xxxxxxxxxxxxxxxxxxxx"        # API token (read_api + write_repository)
# gitlab_username = "botuser"                        # GitLab username for HTTPS auth
# gitlab_default_namespace = "example"                # default namespace for short repo names
# gitlab_reviewer_id = "12345"                       # GitLab user ID to assign as MR reviewer
# gitlab_api_allowlist = [                           # API endpoint allowlist (default below)
#     "GET /api/v4/projects/*",
#     "GET /api/v4/groups/*",
#     "GET /api/v4/users*",
#     "POST /api/v4/projects/*/merge_requests",
#     "POST /api/v4/projects/*/merge_requests/*/notes",
#     "POST /api/v4/projects/*/issues",
#     "POST /api/v4/projects/*/issues/*/notes",
#     "PUT /api/v4/projects/*/merge_requests/*/merge",
# ]
#
# # GitHub settings
# github_url = "https://github.com"                 # GitHub instance URL (or GitHub Enterprise)
# github_token = "ghp_xxxxxxxxxxxxxxxxxxxx"          # Personal access token (repo scope)
# github_username = ""                               # GitHub username (defaults to x-access-token)
# github_default_owner = "myorg"                     # default org/user for short repo names
# github_reviewer = "reviewer-user"                  # GitHub username to request as PR reviewer
# github_api_allowlist = [                           # API endpoint allowlist (default below)
#     "GET /repos/*",
#     "GET /orgs/*",
#     "GET /users/*",
#     "GET /search/*",
#     "POST /repos/*/pulls",
#     "POST /repos/*/pulls/*/reviews",
#     "POST /repos/*/issues",
#     "POST /repos/*/issues/*/comments",
#     "POST /repos/*/pulls/*/comments",
#     "PUT /repos/*/pulls/*/merge",
#     "PATCH /repos/*/pulls/*",
#     "PATCH /repos/*/issues/*",
# ]

# ============================================================================
# ntfy Push Notifications
# ============================================================================
# ntfy is a per-user connected service, configured by each user via the web
# settings UI (`/istota/settings`) or `istota secret ensure -s ntfy ...`.
# There is no operator-shared block — each user supplies their own server,
# topic, and (optional) auth.

# ============================================================================
# Money (accounting)
# ============================================================================
# The money skill runs in-process — there is no instance-level [money]
# block. Per-user access is on by default; opt out via the user's
# `disabled_modules` profile field. Ledger files are auto-discovered from
# `{workspace}/money/ledgers/*.beancount`.

# ============================================================================
# Static Website Hosting
# ============================================================================
# Serves static files at https://{hostname}/~{user_id}/ for users with
# site_enabled = true. Files written directly to base_path/{user_id}/.

# [site]
# enabled = false
# hostname = "istota.example.com"                # public hostname
# base_path = "/srv/app/istota/html"       # local directory for site files

# ============================================================================
# Authenticated Web Interface (Nextcloud built-in OAuth2)
# ============================================================================
# Login-protected web UI backed by Nextcloud's built-in OAuth2 provider
# (no extra NC apps required). Register an OAuth 2.0 client in
# Nextcloud: Settings > Administration > Security > OAuth 2.0 clients,
# redirect URI https://{hostname}/istota/callback. Auth-only flow:
# code exchange → identity check via OCS → token discarded.

# [web]
# enabled = false
# port = 8766
# oauth2_provider = "https://cloud.example.com"   # public NC URL the browser hits
# oauth2_client_id = "istota-web"
# oauth2_client_secret = ""                        # or ISTOTA_WEB_OAUTH2_CLIENT_SECRET env var
# session_secret_key = ""                          # or ISTOTA_WEB_SESSION_SECRET_KEY env var
#
# Optional overrides (defaults derive from oauth2_provider):
# oauth2_token_endpoint = ""                       # server-to-server token URL
# oauth2_userinfo_endpoint = ""                    # server-to-server identity URL
# oauth2_redirect_uri = ""                         # explicit override; otherwise derived from request

# In-app web chat surface (always-on companion to Talk; reachable from the
# "Chat" tab). All knobs have sensible defaults — this block is only for tuning.
# [web.chat]
# max_prompt_chars = 32000
# max_attachment_mb = 25
# attachment_extensions = ["pdf", "png", "jpg", "jpeg", "webp", "gif", "txt", "md", "csv", "wav", "mp3", "m4a", "ogg", "docx", "xlsx"]
# rate_limit_messages = 30                          # per window, per user
# rate_limit_window_seconds = 300
# sse_poll_interval_ms = 200                        # server-side SSE generator cadence
# client_poll_interval_ms = 1500                    # client polling fallback cadence

# ============================================================================
# Google Workspace Integration
# ============================================================================
# Enables the gws CLI skill with OAuth-based authentication.
# Users connect their Google account through the web UI.
# Requires a Google Cloud project with OAuth 2.0 credentials:
# https://console.cloud.google.com/apis/credentials
# Authorized redirect URI: https://{hostname}/istota/google/callback

# [google_workspace]
# enabled = false
# client_id = ""
# client_secret = ""    # or ISTOTA_GOOGLE_WORKSPACE_CLIENT_SECRET env var
# scopes = [
#     "https://www.googleapis.com/auth/drive.readonly",
#     "https://www.googleapis.com/auth/gmail.readonly",
#     "https://www.googleapis.com/auth/calendar.readonly",
#     "https://www.googleapis.com/auth/spreadsheets.readonly",
#     "https://www.googleapis.com/auth/documents.readonly",
# ]

# User configuration
# Map Nextcloud usernames to their settings
# Only messages from configured users will be processed
# email_addresses maps email addresses to users for email input channel

[users.alice]
display_name = "Alice"
email_addresses = ["alice@example.com", "alice.work@company.com"]
timezone = "America/New_York"  # IANA timezone for briefing scheduling
# site_enabled = true  # enable static website at /~alice/
# alerts_channel = "alertsroom456"  # Talk room for confirmations and security alerts
# trusted_email_senders = ["*@company.com"]  # trusted senders bypass email confirmation gate

# Alice's resources
[[users.alice.resources]]
type = "reminders_file"
path = "/Users/alice/shared/Notes/_REMINDERS.md"
name = "Reminders"

# Alice's briefings - morning and evening
[[users.alice.briefings]]
name = "morning"
cron = "0 6 * * *"  # 6am in user's timezone
conversation_token = "room123"  # Talk room to post to
output = "talk,email"  # talk / email / ntfy, or a comma list (default: "talk")

[users.alice.briefings.components]
calendar = true
todos = true
markets = true    # morning → futures, evening → indices (automatic)
news = true       # expands using [briefing_defaults.news] sources
reminders = { enabled = true }  # random item from user's reminders_file resource

[[users.alice.briefings]]
name = "evening"
cron = "0 18 * * *"  # 6pm in user's timezone
conversation_token = "room123"
output = "talk"  # Talk only for evening briefing

[users.alice.briefings.components]
calendar = true
todos = true
markets = true    # morning → futures, evening → indices (automatic)


[users.bob]
display_name = "Bob"
email_addresses = ["bob@example.com"]
timezone = "America/Los_Angeles"

# Bob has no briefings or sleep cycle configured


# Add more users as needed:
# [users.charlie]
# display_name = "Charlie"
# email_addresses = ["charlie@example.com"]
# timezone = "UTC"

# ============================================================================
# Briefing Configuration Notes
# ============================================================================
#
# Briefings are configured per-user in the [[users.NAME.briefings]] array.
# Each briefing has:
#   - name: identifier (e.g., "morning", "evening")
#   - cron: cron expression evaluated in user's timezone
#   - conversation_token: Talk room ID to post briefing to
#   - components: what to include in the briefing
#
# Available components:
#   - calendar: boolean - today's (morning) or tomorrow's (evening) events
#   - todos: boolean - pending TODO items
#   - email: boolean - general unread email summary
#   - markets: { enabled, futures, indices } - pre-fetched market data
#   - news: { enabled, lookback_hours, sources } - newsletter summaries
#   - notes: { enabled } - parse shared notes files for agenda items
#   - reminders: { enabled } - random item from user's reminders_file
#
# Market symbols:
#   - Futures: ES=F (S&P 500), NQ=F (Nasdaq 100), YM=F (Dow)
#   - Indices: ^GSPC (S&P 500), ^IXIC (Nasdaq), ^DJI (Dow Jones)
#
# News sources support:
#   - { type = "email", value = "newsletter@example.com" } - exact sender
#   - { type = "domain", value = "example.com" } - sender domain match

# ============================================================================
# TASKS.md File Monitoring (Auto-Discovery)
# ============================================================================
#
# Each user's /Users/{user_id}/ directory is scanned for a TASKS.md file.
# The daemon automatically discovers these files and processes pending tasks.
#
# No per-user configuration needed - just create a TASKS.md file in the
# user's bot-managed directory (created by `istota user init`).
#
# File format:
#   # Tasks
#   - [ ] Send email to john about the meeting tomorrow
#   - [~] Checking calendar for tomorrow's schedule...
#   - [x] 2025-01-26 12:34 | Summarized report | Result: Summary saved to exports/
#   - [!] 2025-01-26 12:35 | Failed task | Error: timeout (attempt 2/3)
#
# Status markers:
#   - [ ] Pending (new, not yet picked up)
#   - [~] In progress (being processed)
#   - [x] Completed successfully
#   - [!] Failed (includes error and retry count)
#
# Email notifications are sent automatically if the user has email_addresses
# configured and email is enabled.
