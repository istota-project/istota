# Istota configuration

# The name your bot uses in chat, emails, and folder names.
# Change this to whatever you want to call your assistant.
bot_name = "Istota"

# Include emissaries.md (constitutional principles) in system prompts (default: true)
# emissaries_enabled = true

# =============================================================================
# Model selection — three knobs that interact
# =============================================================================
# `model` + `effort` set the *default* for every task (cron, briefings, talk,
# email, ...). Both fields are read independently — see footgun below.
# `[models.roles]` (further down) rebinds role aliases like smart/general/fast.
#
# Resolution chain:
#   1. Per-task overrides — `!model <alias> <prompt>` from Talk wins, both
#      model and effort stored on the task row.
#   2. Otherwise — top-level `model` + `effort` here.
#   3. Otherwise — brain default.
#
# FOOTGUN — provider aliases like "opus-46-high" encode model AND effort
# only when used via the Talk `!model` prefix. In this top-level config,
# `model = "opus-46-high"` resolves the model to claude-opus-4-6 but leaves
# `effort` empty (= medium default). To pin Opus 4.6 + high effort as the
# *global* default you must set BOTH:
#   model = "opus-46-high"   (or equivalently "claude-opus-4-6")
#   effort = "high"
# =============================================================================

# Claude model. Accepts:
#   - canonical IDs    "claude-opus-4-7", "claude-opus-4-6", "claude-sonnet-4-6"
#   - provider aliases "opus", "opus-high", "opus-46-high", "sonnet", "haiku"
#   - role aliases     "smart", "general", "fast", or any custom role from
#                      [models.roles] below
# Bare aliases ("opus", "sonnet") float to the current latest version each
# release; canonical IDs are immutable.
# Empty or omitted = brain default.
# model = "claude-opus-4-7"

# Effort level (Opus 4.7, Opus 4.6, Sonnet 4.6 only): low, medium, high, xhigh, max.
# Opus 4.7 supports all five and defaults to xhigh. Other models top out at high (or max).
# Read independently of `model` — see footgun above.
# Empty or omitted = model default.
# effort = "high"

# Use config/system-prompt.md instead of Claude Code's default system prompt.
# The custom prompt is minimal, focused on tool usage and working practices.
# custom_system_prompt = true

# Database path (relative to working directory or absolute)
db_path = "data/istota.db"

# =============================================================================
# File Access Configuration
# =============================================================================
# Choose ONE of the following options:

# Option 1: rclone CLI (default, works without systemd mount)
# Uses subprocess calls to rclone for each file operation
rclone_remote = "nextcloud"

# Option 2: Local mount (faster, requires mount-nextcloud.service)
# Uncomment to enable - all Nextcloud files accessible as local paths
# nextcloud_mount_path = "/srv/mount/nextcloud/content"

# Path to skills directory (individual skill files loaded selectively)
skills_dir = "config/skills"

# Skills to exclude from selection (instance-wide)
# disabled_skills = ["browse", "whisper"]

# Temporary directory for task execution
temp_dir = "/tmp/istota"

# Brain — selects the model-invocation backend. Phase 1 ships only "claude_code"
# (wraps the `claude` CLI). Future values: "openrouter", "anthropic" for
# direct-HTTP brains. The Brain protocol lives in src/istota/brain/ so swapping
# backends doesn't touch executor orchestration (memory, skills, sandbox, etc.).
# [brain]
# kind = "claude_code"

# ============================================================================
# Security Hardening
# ============================================================================
# Claude subprocess runs with a clean minimal environment and --allowedTools
# whitelist. Credentials are injected per-task and optionally routed through
# the skill proxy (enabled by default) for credential isolation.
# Secrets can be provided via env vars (e.g. from systemd EnvironmentFile=).
# Naming convention: ISTOTA_<SECTION>_<FIELD>, matching the config dataclass path.
#   ISTOTA_NEXTCLOUD_APP_PASSWORD, ISTOTA_EMAIL_IMAP_PASSWORD, ISTOTA_EMAIL_SMTP_PASSWORD,
#   ISTOTA_DEVELOPER_GITLAB_TOKEN, ISTOTA_DEVELOPER_GITHUB_TOKEN

# [security]
# sandbox_enabled = true           # bwrap filesystem isolation per user (Linux only)
# sandbox_admin_db_write = false   # allow admin DB writes inside sandbox
# skill_proxy_enabled = true       # proxy skill CLI calls via Unix socket (credential isolation)
# skill_proxy_timeout = 300        # timeout for proxied skill commands (seconds)
# passthrough_env_vars = ["LANG", "LC_ALL", "LC_CTYPE", "TZ"]
# sandbox_ro_paths = ["/srv/app"]  # extra RO bind-mounts in sandbox

# [security.network]
# enabled = true                   # --unshare-net + CONNECT proxy (requires sandbox)
# allow_pypi = true                # add pypi.org + files.pythonhosted.org to allowlist
# extra_hosts = []                 # operator-specific additions (e.g. ["registry.example.com:443"])

[nextcloud]
# Nextcloud server URL
url = "https://nextcloud.example.com"
# Bot's Nextcloud username
username = "istota"
# App password (generate in Nextcloud: Settings > Security > Devices & sessions)
# Note: CalDAV settings are derived from these values automatically
# CalDAV URL = {url}/remote.php/dav, using same username/app_password
app_password = "xxxxx-xxxxx-xxxxx-xxxxx-xxxxx"

[talk]
# Enable Talk polling (requires istota user to be added to conversations)
enabled = true
# Bot's Nextcloud username (to filter its own messages)
bot_username = "istota"

[email]
# Enable email functionality (requires himalaya to be installed)
enabled = true
# IMAP settings (for receiving)
imap_host = "imap.example.com"
imap_port = 993
imap_user = "istota@example.com"
imap_password = "app-password-here"
# SMTP settings (for sending) - defaults to IMAP credentials if not set
smtp_host = "smtp.example.com"
smtp_port = 587
# smtp_user = ""  # uses imap_user if empty
# smtp_password = ""  # uses imap_password if empty
# Polling settings
poll_folder = "INBOX"
bot_email = "istota@example.com"  # bot's email address (to skip own messages)

[conversation]
# Enable conversation context (uses Sonnet to select relevant previous messages)
enabled = true
# Number of recent messages to consider
lookback_count = 25
# Include all messages without selection if history <= this threshold (faster for short threads)
skip_selection_threshold = 3
# Model for selecting relevant context. Accepts canonical IDs ("claude-haiku-4-5"),
# provider aliases ("haiku"), or role aliases ("fast" — default; resolves to
# Haiku via brain.claude_code.DEFAULT_ROLE_TARGETS, operator-overridable via
# [models.roles] below).
selection_model = "fast"
# Timeout for context selection
selection_timeout = 30.0
# Set to false to include all lookback messages without LLM selection (useful for testing)
use_selection = true
# Always include this many recent messages without selection (rest triaged by model)
always_include_recent = 5
# Max chars per bot response in conversation context (0 to disable truncation)
context_truncation = 0
# Number of recent unfiltered tasks to inject into context (ensures scheduled/briefing
# messages aren't orphaned when the user replies to them)
previous_tasks_count = 3
# Messages to fetch from Talk API for context (max 200, default 100)
# Talk API-based context shows all participants' messages, not just bot interactions
talk_context_limit = 100

[logging]
# Log level: INFO (default) or DEBUG (verbose)
level = "INFO"
# Output destination: console, file, or both
output = "console"
# Log file path (when output includes "file")
# file = "/var/log/istota/istota.log"
# rotate = true
# max_size_mb = 10
# backup_count = 5

[scheduler]
# Seconds between checking for new tasks in the queue
poll_interval = 5
# Seconds between polling Talk conversations
talk_poll_interval = 10
# Long-poll timeout for Talk API (server-side wait)
talk_poll_timeout = 30
# Max seconds to wait for all rooms before processing available results
# Rooms that respond faster (with new messages) are processed immediately;
# quiet rooms still long-polling are cancelled and re-polled next cycle
talk_poll_wait = 2.0
# Seconds between polling for new emails
email_poll_interval = 60
# Seconds between checking for briefings to run
briefing_check_interval = 60
# Seconds between polling TASKS.md files for new tasks
tasks_file_poll_interval = 30

# Progress updates during task execution (Talk only)
# When enabled, sends real-time updates to Talk as Claude works (e.g., "Reading TODO.txt")
progress_updates = true
# Minimum seconds between progress messages (prevents flooding)
progress_min_interval = 8
# Maximum progress messages per task
progress_max_messages = 5
# Show tool use descriptions ("Reading file.txt", "Running script...")
progress_show_tool_use = true
# Show intermediate assistant text (can be noisy, off by default)
progress_show_text = false
# Max characters for text progress messages (0 = unlimited)
progress_text_max_chars = 200
# Progress display style: "replace" (latest tool + elapsed time), "full" (append all),
# "none" (silent — no progress updates). Default: "replace"
progress_style = "replace"
# Max tool actions shown in the edited progress message (full mode only)
progress_max_display_items = 20

# Kill task execution after N minutes (default: 30)
task_timeout_minutes = 30
# Include selected skills in log channel messages (default: true)
log_channel_show_skills = true
# Robustness settings
# Auto-cancel tasks awaiting confirmation after N minutes (default: 120 = 2 hours)
confirmation_timeout_minutes = 120
# Log warnings for tasks pending longer than N minutes (default: 30)
stale_pending_warn_minutes = 30
# Auto-fail tasks pending longer than N hours (default: 24 = 1 day)
stale_pending_fail_hours = 24
# Delete completed/failed/cancelled tasks older than N days (default: 7)
task_retention_days = 7
# Delete emails older than N days from IMAP inbox (default: 7, 0 to disable)
email_retention_days = 7
# Max cached talk messages per conversation (default: 200)
talk_cache_max_per_conversation = 200

# Deferred subtask creation limits (defense against prompt-injection-driven fan-out).
# Subtasks are created when an admin task writes a deferred JSON request; these caps
# bound how much damage a single injected task can do.
# Max subtasks created per parent task (default: 10)
max_subtasks_per_task = 10
# Max chain depth — a task at depth N cannot spawn further subtasks when N >= max
# (default: 3, set to 0 to disable). With max=3 a chain like talk → subtask → subtask
# → subtask is allowed but no deeper.
max_subtask_depth = 3
# Skip deferred subtasks whose prompt exceeds this size in chars (default: 8000, 0 = unlimited)
max_subtask_prompt_chars = 8000

# Per-user worker pool settings
# Maximum concurrent foreground (interactive) worker threads
max_foreground_workers = 5
# Maximum concurrent background (scheduled/briefing) worker threads
max_background_workers = 3
# Global per-user worker defaults (individual users can override in their config)
# user_max_foreground_workers = 2
# user_max_background_workers = 1
# Seconds before an idle worker thread exits
worker_idle_timeout = 30

# ============================================================================
# Briefing Defaults
# ============================================================================
# Admin-level defaults for briefing components. When a user sets
# `markets = true` or `news = true` in their workspace BRIEFINGS.md,
# these defaults are expanded into the full component config.

# [briefing_defaults.markets]
# Not needed — futures/indices symbols default from markets.py
# Only add if you want to override the built-in symbols:
# futures = ["ES=F", "NQ=F", "YM=F"]
# indices = ["^GSPC", "^IXIC", "^DJI"]

[briefing_defaults.news]
lookback_hours = 12
sources = [
    { type = "domain", value = "semafor.com" },
    { type = "email", value = "briefing@nytimes.com" },
]

[briefing_defaults.headlines]
sources = ["ap", "reuters", "guardian", "ft", "aljazeera", "lemonde", "spiegel"]

# ============================================================================
# Skills (routing configuration)
# ============================================================================
# Controls how skills are selected for each task. Pass 1 is keyword matching
# (always on). Pass 2 is an LLM-based classification that catches implied
# skill needs that keywords miss (e.g., "fix the bug" implies developer skill).

# [skills]
# semantic_routing = true              # enable LLM-based Pass 2 skill classification
# semantic_routing_model = "fast"      # role alias (resolves to Haiku); accepts canonical / provider / role aliases
# semantic_routing_timeout = 3.0       # seconds, falls back to Pass 1 on timeout

# ============================================================================
# Model role aliases (operator override) — optional
# ============================================================================
# Roles are provider-agnostic names that internal call sites resolve through
# the active brain at runtime. Defaults (in code, brain.claude_code.DEFAULT_ROLE_TARGETS):
#   fast    → claude-haiku-4-5    (used by: context triage, skill classification)
#   general → claude-sonnet-4-6   (used by: sleep cycle extraction + USER.md curation)
#   smart   → claude-opus-4-7     (NOT used by internal code — exists for `!model smart`
#                                  from Talk and for any future code path that wants
#                                  "the best model")
#
# Rebind any role to a canonical ID, a provider alias from MODEL_ALIASES, or
# add a custom role name accessible via `!model <name>` from Talk.
#
# NOTE: role aliases never carry effort — `smart = "opus-46-high"` resolves
# `smart` to claude-opus-4-6 only; effort still tracks the top-level `effort`
# field (or the per-task override) unless the user types the provider alias
# directly via `!model opus-46-high <prompt>`.
#
# Example (uncomment to use):
# [models.roles]
# smart = "opus-46-high"   # rebind user-facing "smart" alias to Opus 4.6
# deep  = "opus-max"       # define a custom role for "deep thinking" tasks
# fast  = "haiku"          # explicit (matches default; cosmetic)

# ============================================================================
# Sleep Cycle (nightly memory extraction)
# ============================================================================
# Extracts long-term memories from completed tasks for each user nightly.
# Cron evaluated in each user's timezone (e.g., "0 2 * * *" = 2am local).
# Memories written to /Users/{user_id}/memories/YYYY-MM-DD.md.

# [sleep_cycle]
# enabled = true                       # enabled by default
# cron = "0 2 * * *"                  # 2am in user's timezone
# memory_retention_days = 0            # 0 = unlimited; >0 nightly deletes both dated memory FILES and
#                                      # ephemeral memory_chunks (conversation, memory_file, channel_memory)
#                                      # older than N days. Durable user_memory chunks are not swept.
# lookback_hours = 24                  # how far back to look for interactions
# auto_load_dated_days = 3             # auto-load N days of dated memories into prompts (0 = disabled)
# curate_user_memory = false           # nightly USER.md curation (op-based: append/add_heading/remove)
# curation_log_summary = true          # post one-line "USER.md curated: +N appended, ..." to user log_channel
# knowledge_graph_audit_retention_days = 365  # prune knowledge_facts_audit older than N days
#                                              # (independent of memory_retention_days so default
#                                              # deployments still prune; 0 = unlimited)

# ============================================================================
# Channel Sleep Cycle (shared channel memory extraction)
# ============================================================================
# Extracts shared memories from channel conversations nightly.
# Auto-discovers active channels — no explicit channel list needed.
# Cron evaluated in UTC since channels span users in different timezones.

# [channel_sleep_cycle]
# enabled = true                    # enabled by default
# cron = "0 3 * * *"               # 3am UTC (after user sleep cycles at 2am)
# lookback_hours = 24               # how far back to look for interactions
# memory_retention_days = 0           # 0 = unlimited; >0 nightly deletes dated channel memory files
#                                     # and channel_memory chunks older than N days

# ============================================================================
# Developer Skill (Git + GitLab/GitHub Workflows)
# ============================================================================
# Enables Claude Code to work in git repositories, create GitLab merge requests,
# and GitHub pull requests. Uses bare clones + git worktrees for branch isolation.
# Recommended: use dedicated bot accounts with minimal required permissions.

# [developer]
# enabled = false
# repos_dir = "/srv/repos"                          # base dir for clones + worktrees
#
# # GitLab settings
# gitlab_url = "https://gitlab.com"                 # GitLab instance URL
# gitlab_token = "glpat-xxxxxxxxxxxxxxxxxxxx"        # API token (read_api + write_repository)
# gitlab_username = "botuser"                        # GitLab username for HTTPS auth
# gitlab_default_namespace = "example"                # default namespace for short repo names
# gitlab_reviewer_id = "12345"                       # GitLab user ID to assign as MR reviewer
# gitlab_api_allowlist = [                           # API endpoint allowlist (default below)
#     "GET /api/v4/projects/*",
#     "GET /api/v4/groups/*",
#     "GET /api/v4/users*",
#     "POST /api/v4/projects/*/merge_requests",
#     "POST /api/v4/projects/*/merge_requests/*/notes",
#     "POST /api/v4/projects/*/issues",
#     "POST /api/v4/projects/*/issues/*/notes",
#     "PUT /api/v4/projects/*/merge_requests/*/merge",
# ]
#
# # GitHub settings
# github_url = "https://github.com"                 # GitHub instance URL (or GitHub Enterprise)
# github_token = "ghp_xxxxxxxxxxxxxxxxxxxx"          # Personal access token (repo scope)
# github_username = ""                               # GitHub username (defaults to x-access-token)
# github_default_owner = "myorg"                     # default org/user for short repo names
# github_reviewer = "reviewer-user"                  # GitHub username to request as PR reviewer
# github_api_allowlist = [                           # API endpoint allowlist (default below)
#     "GET /repos/*",
#     "GET /orgs/*",
#     "GET /users/*",
#     "GET /search/*",
#     "POST /repos/*/pulls",
#     "POST /repos/*/pulls/*/reviews",
#     "POST /repos/*/issues",
#     "POST /repos/*/issues/*/comments",
#     "POST /repos/*/pulls/*/comments",
#     "PUT /repos/*/pulls/*/merge",
#     "PATCH /repos/*/pulls/*",
#     "PATCH /repos/*/issues/*",
# ]

# ============================================================================
# ntfy Push Notifications
# ============================================================================
# ntfy is a per-user connected service, configured by each user via the web
# settings UI (`/istota/settings`) or `istota secret ensure -s ntfy ...`.
# There is no operator-shared block — each user supplies their own server,
# topic, and (optional) auth.

# ============================================================================
# Money (accounting)
# ============================================================================
# The money skill runs in-process — there is no instance-level [money]
# block. Per-user access is on by default; opt out via the user's
# `disabled_modules` profile field. Ledger files are auto-discovered from
# `{workspace}/money/ledgers/*.beancount`.

# ============================================================================
# Static Website Hosting
# ============================================================================
# Serves static files at https://{hostname}/~{user_id}/ for users with
# site_enabled = true. Files written directly to base_path/{user_id}/.

# [site]
# enabled = false
# hostname = "istota.example.com"                # public hostname
# base_path = "/srv/app/istota/html"       # local directory for site files

# ============================================================================
# Authenticated Web Interface (Nextcloud built-in OAuth2)
# ============================================================================
# Login-protected web UI backed by Nextcloud's built-in OAuth2 provider
# (no extra NC apps required). Register an OAuth 2.0 client in
# Nextcloud: Settings > Administration > Security > OAuth 2.0 clients,
# redirect URI https://{hostname}/istota/callback. Auth-only flow:
# code exchange → identity check via OCS → token discarded.

# [web]
# enabled = false
# port = 8766
# oauth2_provider = "https://cloud.example.com"   # public NC URL the browser hits
# oauth2_client_id = "istota-web"
# oauth2_client_secret = ""                        # or ISTOTA_WEB_OAUTH2_CLIENT_SECRET env var
# session_secret_key = ""                          # or ISTOTA_WEB_SESSION_SECRET_KEY env var
#
# Optional overrides (defaults derive from oauth2_provider):
# oauth2_token_endpoint = ""                       # server-to-server token URL
# oauth2_userinfo_endpoint = ""                    # server-to-server identity URL
# oauth2_redirect_uri = ""                         # explicit override; otherwise derived from request

# ============================================================================
# Google Workspace Integration
# ============================================================================
# Enables the gws CLI skill with OAuth-based authentication.
# Users connect their Google account through the web UI.
# Requires a Google Cloud project with OAuth 2.0 credentials:
# https://console.cloud.google.com/apis/credentials
# Authorized redirect URI: https://{hostname}/istota/google/callback

# [google_workspace]
# enabled = false
# client_id = ""
# client_secret = ""    # or ISTOTA_GOOGLE_WORKSPACE_CLIENT_SECRET env var
# scopes = [
#     "https://www.googleapis.com/auth/drive.readonly",
#     "https://www.googleapis.com/auth/gmail.readonly",
#     "https://www.googleapis.com/auth/calendar.readonly",
#     "https://www.googleapis.com/auth/spreadsheets.readonly",
#     "https://www.googleapis.com/auth/documents.readonly",
# ]

