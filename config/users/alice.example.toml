# Per-user configuration for Alice
# Filename (without .toml) = Nextcloud username

display_name = "Alice"
email_addresses = ["alice@example.com", "alice.work@company.com"]
timezone = "America/New_York"

# User resources (replaces DB-based user_resources)
[[resources]]
type = "folder"
path = "/alice/Projects"
name = "Projects"
permissions = "write"

[[resources]]
type = "todo_file"
path = "/Users/alice/workspace/TASKS.md"
name = "Tasks"
permissions = "write"

[[resources]]
type = "reminders_file"
path = "/Users/alice/workspace/REMINDERS.md"
name = "Reminders"

# Karakeep bookmarks (per-user API credentials)
# [[resources]]
# type = "karakeep"
# name = "Bookmarks"
# base_url = "https://keep.example.com/api/v1"
# api_key = "your-karakeep-api-key"

# Log channel: dedicated Talk room for verbose task execution logs
# Shows real-time tool calls, timing, and task summaries without cluttering working channels
# log_channel = "logroom123"

# Alerts channel: Talk room for confirmations and security alerts
# Used for email confirmation gates (plus-addressed emails from unknown senders)
# alerts_channel = "alertsroom456"

# Trusted email senders: patterns for senders that bypass the email confirmation gate
# User's own email_addresses are implicitly trusted (no need to list them here)
# Supports exact match, domain wildcard (*@example.com), subdomain wildcard (*@*.example.com)
# trusted_email_senders = ["*@company.com", "bob@partner.com"]

# ntfy topic override (uses global [ntfy] topic if empty)
# ntfy_topic = "alice-notifications"

# Per-user worker concurrency limits (0 or omitted = use global default from [scheduler])
# max_foreground_workers = 2
# max_background_workers = 1

# Per-user disabled skills (excluded from keyword matching and loading)
# disabled_skills = ["browse", "whisper"]

# Money (accounting). The skill runs in-process — no separate service.
# Workspace mode (preferred): the loader synthesizes a UserContext from
# the user's istota workspace ({nextcloud}/Users/<user>/<bot_dir>/) and
# reads INVOICING.md / TAX.md / MONARCH.md (with .toml fallback) under
# {data_dir}/config/. Defaults: data_dir = {workspace}/money,
# db_path = {data_dir}/data/money.db, single 'main' ledger at
# {data_dir}/ledgers/main.beancount.
# [[resources]]
# type = "money"
# name = "Money"
# ledgers = ["personal", "business"]
# # data_dir = "/srv/mount/.../shared/Money"   # override default
# # db_path = "/srv/mount/.../money.db"
# # config_dir = "/srv/mount/.../config"
#
# Legacy mode: point config_path at a money config TOML with [users.X]
# sections; user_key defaults to the istota username when omitted.
# [[resources]]
# type = "money"
# name = "Money"
# config_path = "/path/to/money/config.toml"
# # user_key = "alice"

# Monarch Money session token (server-side only, not synced to Nextcloud)
# Can also use [monarch] section syntax (auto-converted to resource)
# [[resources]]
# type = "monarch"
# name = "Monarch Money"
# session_token = "your-session-token"

# Briefings (can also be configured in workspace/BRIEFINGS.md, which takes precedence)
[[briefings]]
name = "morning"
cron = "0 6 * * *"
conversation_token = "room123"
output = "both"

[briefings.components]
calendar = true
todos = true
markets = true    # morning → futures, evening → indices (automatic)
news = true       # expands using [briefing_defaults.news] sources
reminders = { enabled = true }

[[briefings]]
name = "evening"
cron = "0 18 * * *"
conversation_token = "room123"
output = "talk"

[briefings.components]
calendar = true
todos = true
markets = true    # morning → futures, evening → indices (automatic)

