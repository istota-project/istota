services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot init: make shared volume writable by www-data (uid 33)
  init-shared:
    image: alpine:3
    volumes:
      - shared_files:/mnt/shared
    command: ["sh", "-c", "chown 33:33 /mnt/shared && chmod 775 /mnt/shared"]

  nextcloud:
    image: nextcloud:30-apache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-shared:
        condition: service_completed_successfully
    volumes:
      - nextcloud_html:/var/www/html
      - nextcloud_data:/var/www/html/data
      - shared_files:/mnt/shared
      - ./istota/provision-nc.sh:/docker-entrypoint-hooks.d/post-installation/provision.sh:ro
    ports:
      - "${NC_PORT:-8080}:80"
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      POSTGRES_HOST: postgres
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      NEXTCLOUD_TRUSTED_DOMAINS: "localhost nextcloud ${DOMAIN:-}"
      # Passed to provision-nc.sh
      BOT_USER: istota
      BOT_PASSWORD: ${BOT_PASSWORD:?Set BOT_PASSWORD in .env}
      USER_NAME: ${USER_NAME:?Set USER_NAME in .env}
      USER_PASSWORD: ${USER_PASSWORD:?Set USER_PASSWORD in .env}
      USER_DISPLAY_NAME: ${USER_DISPLAY_NAME:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/status.php | grep -q '\"installed\":true'"]
      interval: 15s
      timeout: 10s
      start_period: 300s
      retries: 20
    restart: unless-stopped

  istota:
    build:
      context: ..
      dockerfile: docker/istota/Dockerfile
    depends_on:
      nextcloud:
        condition: service_healthy
    volumes:
      - shared_files:/mnt/shared
      - nextcloud_data:/mnt/nc-data:ro
      - istota_data:/data
    environment:
      # Authentication (at least one required)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Nextcloud / provisioning
      BOT_PASSWORD: ${BOT_PASSWORD}
      USER_NAME: ${USER_NAME}
      USER_DISPLAY_NAME: ${USER_DISPLAY_NAME:-}
      USER_TIMEZONE: ${USER_TIMEZONE:-UTC}
      NC_INTERNAL_URL: http://nextcloud
      # Bot identity
      ISTOTA_BOT_NAME: ${ISTOTA_BOT_NAME:-Istota}
      ISTOTA_EMISSARIES_ENABLED: ${ISTOTA_EMISSARIES_ENABLED:-true}
      ISTOTA_MODEL: ${ISTOTA_MODEL:-}
      ISTOTA_DISABLED_SKILLS: ${ISTOTA_DISABLED_SKILLS:-}
      ISTOTA_MAX_MEMORY_CHARS: ${ISTOTA_MAX_MEMORY_CHARS:-0}
      # Security
      ISTOTA_SECURITY_SANDBOX_ENABLED: ${ISTOTA_SECURITY_SANDBOX_ENABLED:-true}
      ISTOTA_SECURITY_SKILL_PROXY_ENABLED: ${ISTOTA_SECURITY_SKILL_PROXY_ENABLED:-true}
      ISTOTA_SECURITY_SKILL_PROXY_TIMEOUT: ${ISTOTA_SECURITY_SKILL_PROXY_TIMEOUT:-300}
      # Scheduler — polling intervals
      ISTOTA_SCHEDULER_POLL_INTERVAL: ${ISTOTA_SCHEDULER_POLL_INTERVAL:-5}
      ISTOTA_SCHEDULER_TALK_POLL_INTERVAL: ${ISTOTA_SCHEDULER_TALK_POLL_INTERVAL:-10}
      ISTOTA_SCHEDULER_TALK_POLL_TIMEOUT: ${ISTOTA_SCHEDULER_TALK_POLL_TIMEOUT:-30}
      ISTOTA_SCHEDULER_TALK_POLL_WAIT: ${ISTOTA_SCHEDULER_TALK_POLL_WAIT:-2.0}
      ISTOTA_SCHEDULER_EMAIL_POLL_INTERVAL: ${ISTOTA_SCHEDULER_EMAIL_POLL_INTERVAL:-60}
      ISTOTA_SCHEDULER_BRIEFING_CHECK_INTERVAL: ${ISTOTA_SCHEDULER_BRIEFING_CHECK_INTERVAL:-60}
      ISTOTA_SCHEDULER_TASKS_FILE_POLL_INTERVAL: ${ISTOTA_SCHEDULER_TASKS_FILE_POLL_INTERVAL:-30}
      ISTOTA_SCHEDULER_SHARED_FILE_CHECK_INTERVAL: ${ISTOTA_SCHEDULER_SHARED_FILE_CHECK_INTERVAL:-120}
      ISTOTA_SCHEDULER_HEARTBEAT_CHECK_INTERVAL: ${ISTOTA_SCHEDULER_HEARTBEAT_CHECK_INTERVAL:-60}
      # Scheduler — progress updates
      ISTOTA_SCHEDULER_PROGRESS_UPDATES: ${ISTOTA_SCHEDULER_PROGRESS_UPDATES:-true}
      ISTOTA_SCHEDULER_PROGRESS_MIN_INTERVAL: ${ISTOTA_SCHEDULER_PROGRESS_MIN_INTERVAL:-8}
      ISTOTA_SCHEDULER_PROGRESS_MAX_MESSAGES: ${ISTOTA_SCHEDULER_PROGRESS_MAX_MESSAGES:-5}
      ISTOTA_SCHEDULER_PROGRESS_SHOW_TOOL_USE: ${ISTOTA_SCHEDULER_PROGRESS_SHOW_TOOL_USE:-true}
      ISTOTA_SCHEDULER_PROGRESS_SHOW_TEXT: ${ISTOTA_SCHEDULER_PROGRESS_SHOW_TEXT:-false}
      ISTOTA_SCHEDULER_PROGRESS_TEXT_MAX_CHARS: ${ISTOTA_SCHEDULER_PROGRESS_TEXT_MAX_CHARS:-200}
      ISTOTA_SCHEDULER_PROGRESS_STYLE: ${ISTOTA_SCHEDULER_PROGRESS_STYLE:-replace}
      ISTOTA_SCHEDULER_PROGRESS_MAX_DISPLAY_ITEMS: ${ISTOTA_SCHEDULER_PROGRESS_MAX_DISPLAY_ITEMS:-20}
      # Scheduler — robustness & cleanup
      ISTOTA_SCHEDULER_TASK_TIMEOUT_MINUTES: ${ISTOTA_SCHEDULER_TASK_TIMEOUT_MINUTES:-30}
      ISTOTA_SCHEDULER_CONFIRMATION_TIMEOUT_MINUTES: ${ISTOTA_SCHEDULER_CONFIRMATION_TIMEOUT_MINUTES:-120}
      ISTOTA_SCHEDULER_STALE_PENDING_WARN_MINUTES: ${ISTOTA_SCHEDULER_STALE_PENDING_WARN_MINUTES:-30}
      ISTOTA_SCHEDULER_STALE_PENDING_FAIL_HOURS: ${ISTOTA_SCHEDULER_STALE_PENDING_FAIL_HOURS:-2}
      ISTOTA_SCHEDULER_MAX_RETRY_AGE_MINUTES: ${ISTOTA_SCHEDULER_MAX_RETRY_AGE_MINUTES:-60}
      ISTOTA_SCHEDULER_TASK_RETENTION_DAYS: ${ISTOTA_SCHEDULER_TASK_RETENTION_DAYS:-7}
      ISTOTA_SCHEDULER_EMAIL_RETENTION_DAYS: ${ISTOTA_SCHEDULER_EMAIL_RETENTION_DAYS:-7}
      ISTOTA_SCHEDULER_WORKER_IDLE_TIMEOUT: ${ISTOTA_SCHEDULER_WORKER_IDLE_TIMEOUT:-30}
      ISTOTA_SCHEDULER_MAX_FOREGROUND_WORKERS: ${ISTOTA_SCHEDULER_MAX_FOREGROUND_WORKERS:-3}
      ISTOTA_SCHEDULER_MAX_BACKGROUND_WORKERS: ${ISTOTA_SCHEDULER_MAX_BACKGROUND_WORKERS:-2}
      ISTOTA_SCHEDULER_USER_MAX_FOREGROUND_WORKERS: ${ISTOTA_SCHEDULER_USER_MAX_FOREGROUND_WORKERS:-2}
      ISTOTA_SCHEDULER_USER_MAX_BACKGROUND_WORKERS: ${ISTOTA_SCHEDULER_USER_MAX_BACKGROUND_WORKERS:-1}
      ISTOTA_SCHEDULER_SCHEDULED_JOB_MAX_CONSECUTIVE_FAILURES: ${ISTOTA_SCHEDULER_SCHEDULED_JOB_MAX_CONSECUTIVE_FAILURES:-5}
      ISTOTA_SCHEDULER_FEED_CHECK_INTERVAL: ${ISTOTA_SCHEDULER_FEED_CHECK_INTERVAL:-300}
      ISTOTA_SCHEDULER_FEED_ITEM_RETENTION_DAYS: ${ISTOTA_SCHEDULER_FEED_ITEM_RETENTION_DAYS:-30}
      ISTOTA_SCHEDULER_TALK_CACHE_MAX_PER_CONVERSATION: ${ISTOTA_SCHEDULER_TALK_CACHE_MAX_PER_CONVERSATION:-200}
      ISTOTA_SCHEDULER_TEMP_FILE_RETENTION_DAYS: ${ISTOTA_SCHEDULER_TEMP_FILE_RETENTION_DAYS:-7}
      ISTOTA_SCHEDULER_LOCATION_PING_RETENTION_DAYS: ${ISTOTA_SCHEDULER_LOCATION_PING_RETENTION_DAYS:-365}
      # Conversation context
      ISTOTA_CONVERSATION_ENABLED: ${ISTOTA_CONVERSATION_ENABLED:-true}
      ISTOTA_CONVERSATION_LOOKBACK_COUNT: ${ISTOTA_CONVERSATION_LOOKBACK_COUNT:-25}
      ISTOTA_CONVERSATION_SELECTION_MODEL: ${ISTOTA_CONVERSATION_SELECTION_MODEL:-haiku}
      ISTOTA_CONVERSATION_SELECTION_TIMEOUT: ${ISTOTA_CONVERSATION_SELECTION_TIMEOUT:-30.0}
      ISTOTA_CONVERSATION_SKIP_SELECTION_THRESHOLD: ${ISTOTA_CONVERSATION_SKIP_SELECTION_THRESHOLD:-3}
      ISTOTA_CONVERSATION_USE_SELECTION: ${ISTOTA_CONVERSATION_USE_SELECTION:-true}
      ISTOTA_CONVERSATION_ALWAYS_INCLUDE_RECENT: ${ISTOTA_CONVERSATION_ALWAYS_INCLUDE_RECENT:-5}
      ISTOTA_CONVERSATION_CONTEXT_TRUNCATION: ${ISTOTA_CONVERSATION_CONTEXT_TRUNCATION:-0}
      ISTOTA_CONVERSATION_CONTEXT_RECENCY_HOURS: ${ISTOTA_CONVERSATION_CONTEXT_RECENCY_HOURS:-0}
      ISTOTA_CONVERSATION_CONTEXT_MIN_MESSAGES: ${ISTOTA_CONVERSATION_CONTEXT_MIN_MESSAGES:-10}
      ISTOTA_CONVERSATION_PREVIOUS_TASKS_COUNT: ${ISTOTA_CONVERSATION_PREVIOUS_TASKS_COUNT:-3}
      ISTOTA_CONVERSATION_TALK_CONTEXT_LIMIT: ${ISTOTA_CONVERSATION_TALK_CONTEXT_LIMIT:-100}
      # Logging
      ISTOTA_LOGGING_LEVEL: ${ISTOTA_LOGGING_LEVEL:-INFO}
      ISTOTA_LOGGING_OUTPUT: ${ISTOTA_LOGGING_OUTPUT:-console}
      ISTOTA_LOGGING_FILE: ${ISTOTA_LOGGING_FILE:-}
      # Talk
      ISTOTA_TALK_ENABLED: ${ISTOTA_TALK_ENABLED:-true}
      # Email (optional)
      ISTOTA_EMAIL_ENABLED: ${ISTOTA_EMAIL_ENABLED:-false}
      ISTOTA_EMAIL_IMAP_HOST: ${ISTOTA_EMAIL_IMAP_HOST:-}
      ISTOTA_EMAIL_IMAP_PORT: ${ISTOTA_EMAIL_IMAP_PORT:-993}
      ISTOTA_EMAIL_IMAP_USER: ${ISTOTA_EMAIL_IMAP_USER:-}
      ISTOTA_EMAIL_IMAP_PASSWORD: ${ISTOTA_EMAIL_IMAP_PASSWORD:-}
      ISTOTA_EMAIL_SMTP_HOST: ${ISTOTA_EMAIL_SMTP_HOST:-}
      ISTOTA_EMAIL_SMTP_PORT: ${ISTOTA_EMAIL_SMTP_PORT:-587}
      ISTOTA_EMAIL_POLL_FOLDER: ${ISTOTA_EMAIL_POLL_FOLDER:-INBOX}
      ISTOTA_EMAIL_BOT_ADDRESS: ${ISTOTA_EMAIL_BOT_ADDRESS:-}
      # Sleep cycle
      ISTOTA_SLEEP_CYCLE_ENABLED: ${ISTOTA_SLEEP_CYCLE_ENABLED:-true}
      ISTOTA_SLEEP_CYCLE_CRON: ${ISTOTA_SLEEP_CYCLE_CRON:-0 2 * * *}
      ISTOTA_SLEEP_CYCLE_LOOKBACK_HOURS: ${ISTOTA_SLEEP_CYCLE_LOOKBACK_HOURS:-24}
      ISTOTA_SLEEP_CYCLE_MEMORY_RETENTION_DAYS: ${ISTOTA_SLEEP_CYCLE_MEMORY_RETENTION_DAYS:-0}
      ISTOTA_SLEEP_CYCLE_AUTO_LOAD_DATED_DAYS: ${ISTOTA_SLEEP_CYCLE_AUTO_LOAD_DATED_DAYS:-3}
      ISTOTA_SLEEP_CYCLE_CURATE_USER_MEMORY: ${ISTOTA_SLEEP_CYCLE_CURATE_USER_MEMORY:-false}
      # Channel sleep cycle
      ISTOTA_CHANNEL_SLEEP_CYCLE_ENABLED: ${ISTOTA_CHANNEL_SLEEP_CYCLE_ENABLED:-true}
      ISTOTA_CHANNEL_SLEEP_CYCLE_CRON: ${ISTOTA_CHANNEL_SLEEP_CYCLE_CRON:-0 3 * * *}
      ISTOTA_CHANNEL_SLEEP_CYCLE_LOOKBACK_HOURS: ${ISTOTA_CHANNEL_SLEEP_CYCLE_LOOKBACK_HOURS:-24}
      ISTOTA_CHANNEL_SLEEP_CYCLE_MEMORY_RETENTION_DAYS: ${ISTOTA_CHANNEL_SLEEP_CYCLE_MEMORY_RETENTION_DAYS:-0}
      # Memory search
      ISTOTA_MEMORY_SEARCH_ENABLED: ${ISTOTA_MEMORY_SEARCH_ENABLED:-false}
      ISTOTA_MEMORY_SEARCH_AUTO_INDEX_CONVERSATIONS: ${ISTOTA_MEMORY_SEARCH_AUTO_INDEX_CONVERSATIONS:-true}
      ISTOTA_MEMORY_SEARCH_AUTO_INDEX_MEMORY_FILES: ${ISTOTA_MEMORY_SEARCH_AUTO_INDEX_MEMORY_FILES:-true}
      ISTOTA_MEMORY_SEARCH_AUTO_RECALL: ${ISTOTA_MEMORY_SEARCH_AUTO_RECALL:-false}
      ISTOTA_MEMORY_SEARCH_AUTO_RECALL_LIMIT: ${ISTOTA_MEMORY_SEARCH_AUTO_RECALL_LIMIT:-5}
      # ntfy notifications (optional)
      ISTOTA_NTFY_ENABLED: ${ISTOTA_NTFY_ENABLED:-false}
      ISTOTA_NTFY_SERVER_URL: ${ISTOTA_NTFY_SERVER_URL:-https://ntfy.sh}
      ISTOTA_NTFY_TOPIC: ${ISTOTA_NTFY_TOPIC:-}
      ISTOTA_NTFY_TOKEN: ${ISTOTA_NTFY_TOKEN:-}
      ISTOTA_NTFY_USERNAME: ${ISTOTA_NTFY_USERNAME:-}
      ISTOTA_NTFY_PASSWORD: ${ISTOTA_NTFY_PASSWORD:-}
      ISTOTA_NTFY_PRIORITY: ${ISTOTA_NTFY_PRIORITY:-3}
      # Browser (optional)
      ISTOTA_BROWSER_ENABLED: ${ISTOTA_BROWSER_ENABLED:-false}
      ISTOTA_BROWSER_API_URL: ${ISTOTA_BROWSER_API_URL:-http://localhost:9223}
      ISTOTA_BROWSER_VNC_URL: ${ISTOTA_BROWSER_VNC_URL:-}
      # Location tracking (optional)
      ISTOTA_LOCATION_ENABLED: ${ISTOTA_LOCATION_ENABLED:-false}
      ISTOTA_WEBHOOKS_PORT: ${ISTOTA_WEBHOOKS_PORT:-8765}
      # Developer skill (optional)
      ISTOTA_DEVELOPER_ENABLED: ${ISTOTA_DEVELOPER_ENABLED:-false}
      ISTOTA_DEVELOPER_REPOS_DIR: ${ISTOTA_DEVELOPER_REPOS_DIR:-}
      ISTOTA_DEVELOPER_AUTHOR_CREDIT: ${ISTOTA_DEVELOPER_AUTHOR_CREDIT:-}
      ISTOTA_DEVELOPER_GITLAB_URL: ${ISTOTA_DEVELOPER_GITLAB_URL:-https://gitlab.com}
      ISTOTA_DEVELOPER_GITLAB_TOKEN: ${ISTOTA_DEVELOPER_GITLAB_TOKEN:-}
      ISTOTA_DEVELOPER_GITLAB_USERNAME: ${ISTOTA_DEVELOPER_GITLAB_USERNAME:-}
      ISTOTA_DEVELOPER_GITLAB_DEFAULT_NAMESPACE: ${ISTOTA_DEVELOPER_GITLAB_DEFAULT_NAMESPACE:-}
      ISTOTA_DEVELOPER_GITLAB_REVIEWER_ID: ${ISTOTA_DEVELOPER_GITLAB_REVIEWER_ID:-}
      ISTOTA_DEVELOPER_GITHUB_URL: ${ISTOTA_DEVELOPER_GITHUB_URL:-https://github.com}
      ISTOTA_DEVELOPER_GITHUB_TOKEN: ${ISTOTA_DEVELOPER_GITHUB_TOKEN:-}
      ISTOTA_DEVELOPER_GITHUB_USERNAME: ${ISTOTA_DEVELOPER_GITHUB_USERNAME:-}
      ISTOTA_DEVELOPER_GITHUB_DEFAULT_OWNER: ${ISTOTA_DEVELOPER_GITHUB_DEFAULT_OWNER:-}
      ISTOTA_DEVELOPER_GITHUB_REVIEWER: ${ISTOTA_DEVELOPER_GITHUB_REVIEWER:-}
      # Briefing defaults (optional)
      ISTOTA_BRIEFING_DEFAULTS_NEWS_LOOKBACK_HOURS: ${ISTOTA_BRIEFING_DEFAULTS_NEWS_LOOKBACK_HOURS:-}
      ISTOTA_BRIEFING_DEFAULTS_NEWS_SOURCES: ${ISTOTA_BRIEFING_DEFAULTS_NEWS_SOURCES:-}
      # Per-user overrides
      USER_EMAIL: ${USER_EMAIL:-}
      USER_LOG_CHANNEL: ${USER_LOG_CHANNEL:-}
      USER_NTFY_TOPIC: ${USER_NTFY_TOPIC:-}
      USER_MAX_FOREGROUND_WORKERS: ${USER_MAX_FOREGROUND_WORKERS:-}
      USER_MAX_BACKGROUND_WORKERS: ${USER_MAX_BACKGROUND_WORKERS:-}
      USER_DISABLED_SKILLS: ${USER_DISABLED_SKILLS:-}
    restart: unless-stopped

  browser:
    build:
      context: browser/
      dockerfile: Dockerfile
    container_name: istota-browser
    profiles:
      - browser
    ports:
      - "${BROWSER_API_BIND:-127.0.0.1}:${BROWSER_API_PORT:-9223}:9223"
      - "0.0.0.0:${BROWSER_VNC_PORT:-6080}:6080"
    shm_size: ${BROWSER_SHM_SIZE:-2gb}
    environment:
      VNC_PASSWORD: ${VNC_PASSWORD:-}
      BROWSER_VNC_URL: ${ISTOTA_BROWSER_VNC_URL:-}
    deploy:
      resources:
        limits:
          memory: ${BROWSER_MEMORY_LIMIT:-3G}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9223/health | python -c \"import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('browser_connected',False) else 1)\""]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    volumes:
      - browser_profile:/data/browser-profile
    restart: unless-stopped

  webhooks:
    build:
      context: ..
      dockerfile: docker/istota/Dockerfile
    profiles:
      - location
    depends_on:
      nextcloud:
        condition: service_healthy
    ports:
      - "${ISTOTA_WEBHOOKS_PORT:-8765}:${ISTOTA_WEBHOOKS_PORT:-8765}"
    volumes:
      - shared_files:/mnt/shared
      - istota_data:/data
    environment:
      ISTOTA_WEBHOOKS_PORT: ${ISTOTA_WEBHOOKS_PORT:-8765}
    entrypoint: ["/bin/sh", "-c", "mkdir -p /app/config && ln -sf /data/config/config.toml /app/config/config.toml && exec uv run uvicorn istota.webhook_receiver:app --host 0.0.0.0 --port ${ISTOTA_WEBHOOKS_PORT:-8765}"]
    command: []
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  nextcloud_html:
  nextcloud_data:
  shared_files:
  istota_data:
  browser_profile:
