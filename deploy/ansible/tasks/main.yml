# ============================================================
# LEDGER BACKUP DIRECTORIES (for auto-append rotating backups)
# ============================================================

- name: Create ledger backup directories
  file:
    path: "{{ (istota_nextcloud_mount_path + '/' + item.1.path | regex_replace('^/', '')) | dirname }}/backups"
    state: directory
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0755"
  loop: >-
    {{ istota_users | dict2items
       | selectattr('value.resources', 'defined')
       | subelements('value.resources')
       | selectattr('1.type', 'equalto', 'ledger')
       | list }}
  loop_control:
    label: "{{ item.0.key }} - {{ item.1.path | dirname }}/backups"
  when: istota_use_nextcloud_mount and not istota_web_only

# ============================================================
# NGINX SITE HOSTING
# ============================================================

# nginx — inlined (replace with a dedicated role if you prefer)
- name: Install nginx
  apt:
    name: nginx
    state: present
  when: (istota_site_enabled or istota_location_enabled | default(false) or istota_web_enabled | default(false)) and not istota_update_only and not istota_web_only

- name: Build list of site users
  set_fact:
    _istota_site_users: >-
      {{ istota_users | dict2items
         | selectattr('value.site_enabled', 'defined')
         | selectattr('value.site_enabled', 'equalto', true)
         | list }}
  when: not istota_web_only

- name: Create site root html directory
  file:
    path: "{{ istota_home }}/html"
    state: directory
    owner: "{{ istota_user }}"
    group: www-data
    mode: "0755"
  when: istota_site_enabled and not istota_web_only

- name: Deploy default index.html for site root
  template:
    src: index.html.j2
    dest: "{{ istota_home }}/html/index.html"
    owner: "{{ istota_user }}"
    group: www-data
    mode: "0644"
    force: no
  when: istota_site_enabled and not istota_web_only

- name: Create per-user html directories
  file:
    path: "{{ istota_nextcloud_mount_path }}/Users/{{ item.key }}/{{ istota_namespace }}/html"
    state: directory
    owner: "{{ istota_user }}"
    group: www-data
    mode: "0755"
  loop: "{{ _istota_site_users | default([]) }}"
  loop_control:
    label: "{{ item.key }}"
  when: istota_site_enabled and not istota_web_only

- name: Deploy default index.html for site users
  template:
    src: user-index.html.j2
    dest: "{{ istota_nextcloud_mount_path }}/Users/{{ item.key }}/{{ istota_namespace }}/html/index.html"
    owner: "{{ istota_user }}"
    group: www-data
    mode: "0644"
    force: no
  loop: "{{ _istota_site_users | default([]) }}"
  loop_control:
    label: "{{ item.key }}"
  when: istota_site_enabled and not istota_web_only

- name: Deploy nginx config
  template:
    src: istota.conf.j2
    dest: "/etc/nginx/conf.d/{{ istota_hostname }}.conf"
    owner: root
    group: root
    mode: "0644"
  when: (istota_site_enabled or istota_location_enabled | default(false) or istota_web_enabled | default(false)) and not istota_web_only
  notify:
    - reload nginx

- name: Remove nginx config when all features disabled
  file:
    path: "/etc/nginx/conf.d/{{ istota_hostname }}.conf"
    state: absent
  when: not istota_site_enabled and not (istota_location_enabled | default(false)) and not (istota_web_enabled | default(false)) and not istota_web_only
  notify:
    - reload nginx

- name: Force handlers to run now
  meta: flush_handlers
  when: not istota_web_only

- name: "Enable and start istota-scheduler"
  systemd:
    name: "{{ istota_namespace }}-scheduler"
    enabled: yes
    state: started
    daemon_reload: yes
  when: not istota_web_only

# Update-only mode is "pull latest code, restart services". Handler-based
# restarts only fire when a task reports `changed`, so an idempotent rerun
# (git already at HEAD, config.toml unchanged) leaves the running services
# pinned to old code. Force the restart explicitly here, mirroring the
# `istota_web_only` pattern further up the file.
- name: Restart services (update-only mode)
  systemd:
    name: "{{ item.name }}"
    state: restarted
  loop:
    - { name: "{{ istota_namespace }}-scheduler", enabled: true }
    - { name: "{{ istota_namespace }}-web", enabled: "{{ istota_web_enabled | default(false) }}" }
    - { name: "{{ istota_namespace }}-webhooks", enabled: "{{ istota_location_enabled | default(false) }}" }
  when: istota_update_only and (item.enabled | bool)

- name: Display deployment info
  debug:
    msg:
      - "{{ istota_namespace | capitalize }} has been deployed to {{ istota_home }}"
      - "Scheduler daemon handles all polling (Talk, email, TASKS.md)"
      - "Service: {{ istota_namespace }}-scheduler"
      - "Logs: journalctl -u {{ istota_namespace }}-scheduler -f"
  when: not istota_web_only
