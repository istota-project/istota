---
# Istota - Claude Code Bot deployment tasks
#
# Set istota_update_only=true to skip full installation and just:
# - Pull latest code from repo
# - Update Python dependencies
# - Deploy config files
# - Restart services
#
# Set istota_web_only=true for fast web UI redeployment:
# - Pull latest code from repo
# - Rebuild web UI (npm ci + npm run build)
# - Restart web service

# ============================================================
# FULL INSTALL TASKS (skipped when istota_update_only=true)
# ============================================================

- name: Check for Claude CLI
  stat:
    path: /usr/local/bin/claude
  register: claude_check
  when: not istota_update_only and not istota_web_only and not istota_web_only

- name: Install Claude CLI
  shell: curl -fsSL https://claude.ai/install.sh | bash
  environment:
    HOME: "{{ istota_home }}"
  args:
    creates: "{{ istota_home }}/.local/bin/claude"
  register: claude_install_result
  when: not istota_update_only and not istota_web_only and not (claude_check.stat.exists | default(true))

- name: Show Claude CLI installation output
  debug:
    var: claude_install_result
  when: not istota_update_only and not istota_web_only and claude_install_result is defined and claude_install_result.changed

- name: Verify Claude CLI was installed
  stat:
    path: "{{ istota_home }}/.local/bin/claude"
  register: claude_binary_check
  failed_when: not claude_binary_check.stat.exists
  when: not istota_update_only and not istota_web_only and not (claude_check.stat.exists | default(true))

- name: Symlink Claude CLI to /usr/local/bin
  file:
    src: "{{ istota_home }}/.local/bin/claude"
    dest: /usr/local/bin/claude
    state: link
  when: not istota_update_only and not istota_web_only and not (claude_check.stat.exists | default(true))

- name: Remind to authenticate Claude CLI
  debug:
    msg: |
      Claude CLI installed. Authenticate with one of:
        1. (Preferred) Generate a token locally with `claude setup-token` and set
           istota_claude_code_oauth_token in your vault
        2. (Manual) sudo -u {{ istota_user }} HOME={{ istota_home }} claude login
  when: not istota_update_only and not istota_web_only and not (claude_check.stat.exists | default(true))

- name: Create Claude config directory
  file:
    path: "{{ istota_home }}/.claude"
    state: directory
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0700"
  when: >
    not istota_web_only
    and (istota_claude_code_oauth_token | default('') | length > 0)

- name: Deploy Claude OAuth credentials file
  copy:
    dest: "{{ istota_home }}/.claude/.credentials.json"
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0600"
    content: '{"claudeAiOauth":{"accessToken":"{{ istota_claude_code_oauth_token }}","expiresAt":"9999-12-31T23:59:59.999Z"}}'
  no_log: true
  when: >
    not istota_web_only
    and (istota_claude_code_oauth_token | default('') | length > 0)

- name: Install system dependencies
  apt:
    name:
      - git
      - curl
      - sqlite3
      - python3
      - python3-venv
      - tesseract-ocr
      - libpango-1.0-0      # WeasyPrint PDF generation
      - libpangocairo-1.0-0
      - libgdk-pixbuf-2.0-0
      - unzip               # rclone install script
      - cron                # Scheduled backups
      - bubblewrap          # Per-user filesystem sandbox
      - fuse3               # FUSE mount support (fusermount3)
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: not istota_update_only and not istota_web_only

- name: Enable unprivileged user namespaces for bubblewrap sandbox
  ansible.posix.sysctl:
    name: kernel.unprivileged_userns_clone
    value: "1"
    sysctl_file: "/etc/sysctl.d/99-{{ istota_namespace }}-sandbox.conf"
    reload: yes
  when: istota_security_sandbox_enabled
  failed_when: false

# Docker — inlined (replace with a dedicated role if you prefer)
- name: Check if Docker CE apt repo is configured
  stat:
    path: /etc/apt/sources.list.d/download_docker_com_linux_{{ ansible_facts['distribution'] | lower }}.list
  register: docker_repo_file
  when: not istota_update_only and not istota_web_only and istota_browser_enabled

- name: Add Docker CE apt repository
  when: not istota_update_only and not istota_web_only and istota_browser_enabled and not docker_repo_file.stat.exists
  block:
    - name: Install apt dependencies for Docker repo
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
        dest: /etc/apt/trusted.gpg.d/docker.asc
        mode: '0644'

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_facts['dpkg_architecture'] }} signed-by=/etc/apt/trusted.gpg.d/docker.asc] https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }} {{ ansible_facts['distribution_release'] }} stable"
        state: present

- name: Install Docker for browser container
  apt:
    update_cache: yes
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
  when: not istota_update_only and not istota_web_only and istota_browser_enabled

- name: Add istota user to docker group
  user:
    name: "{{ istota_user }}"
    groups: docker
    append: yes
  when: not istota_update_only and not istota_web_only and istota_browser_enabled

- name: Add istota user to www-data group
  user:
    name: "{{ istota_user }}"
    groups: www-data
    append: yes
  when: not istota_update_only and not istota_web_only and istota_site_enabled

- name: Add www-data to nextcloud-mount group for site hosting
  user:
    name: www-data
    groups: nextcloud-mount
    append: yes
  notify: Restart nginx
  when: not istota_update_only and not istota_web_only and istota_site_enabled and istota_use_nextcloud_mount

- name: Allow Docker containers to access host ports
  community.general.ufw:
    rule: allow
    from_ip: "172.18.0.0/16"
    comment: "Docker containers ({{ istota_namespace }})"
  when: not istota_update_only and not istota_web_only and istota_browser_enabled

# Node.js — inlined (replace with a dedicated role if you prefer)
- name: Install Node.js for developer skill
  block:
    - name: Add NodeSource repository
      shell: curl -fsSL https://deb.nodesource.com/setup_20.x | bash
      args:
        creates: /etc/apt/sources.list.d/nodesource.list
    - name: Install Node.js
      apt:
        name: nodejs
        state: present
  when: not istota_update_only and not istota_web_only and (istota_nodejs_enabled or istota_web_enabled | default(false))

- name: Install Google Workspace CLI (gws)
  shell: |
    set -euo pipefail
    url=$(curl -s https://api.github.com/repos/googleworkspace/cli/releases/latest \
      | grep -o '"browser_download_url": *"[^"]*x86_64-unknown-linux-gnu.tar.gz"' \
      | head -1 | cut -d'"' -f4)
    curl -sL "$url" | tar xz --strip-components=0 -C "{{ istota_home }}/.local/bin" ./gws
    chown {{ istota_user }}:{{ istota_group }} "{{ istota_home }}/.local/bin/gws"
    chmod 0755 "{{ istota_home }}/.local/bin/gws"
  args:
    creates: "{{ istota_home }}/.local/bin/gws"
  when: not istota_update_only and not istota_web_only and (istota_google_workspace_enabled | default(false))
  tags: [gws]

- name: Check if uv is installed
  command: which uv
  register: uv_check
  changed_when: false
  failed_when: false
  when: not istota_update_only and not istota_web_only

- name: Install uv
  shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: /root/.local/bin/uv
  when: not istota_update_only and not istota_web_only and (uv_check.rc | default(0)) != 0

- name: Create istota system group
  group:
    name: "{{ istota_group }}"
    system: yes
    state: present
  when: not istota_update_only and not istota_web_only

- name: Create istota system user
  user:
    name: "{{ istota_user }}"
    group: "{{ istota_group }}"
    system: yes
    home: "{{ istota_home }}"
    shell: /bin/bash
    create_home: no
    state: present
  when: not istota_update_only and not istota_web_only

- name: Create istota directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0755"
  loop:
    - "{{ istota_home }}"
    - "{{ istota_home }}/data"
    - "{{ istota_home }}/data/browser-profile"
    - "{{ istota_home }}/tmp"
    - "{{ istota_home }}/.config"
  when: not istota_update_only and not istota_web_only

- name: "Create /var/log/{{ istota_namespace }} directory"
  file:
    path: "/var/log/{{ istota_namespace }}"
    state: directory
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0755"
  when: not istota_update_only and not istota_web_only

- name: Deploy logrotate configuration
  template:
    src: istota-logrotate.j2
    dest: "/etc/logrotate.d/{{ istota_namespace }}"
    owner: root
    group: root
    mode: "0644"
  when: not istota_update_only and not istota_web_only

# rclone — inlined (replace with a dedicated role if you prefer)
- name: Install rclone
  shell: curl https://rclone.org/install.sh | bash
  args:
    creates: /usr/bin/rclone
  when: not istota_update_only and not istota_web_only and istota_configure_rclone

- name: Create rclone config directory
  file:
    path: "{{ istota_home }}/.config/rclone"
    state: directory
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0700"
  when: not istota_update_only and not istota_web_only and istota_configure_rclone

- name: Auto-obscure rclone password from app password
  command: /usr/bin/rclone obscure "{{ istota_nextcloud_app_password }}"
  register: _istota_rclone_obscured
  changed_when: false
  no_log: true
  when: >
    not istota_update_only and not istota_web_only and istota_configure_rclone
    and (istota_rclone_password_obscured | default('') | length == 0)
    and (istota_nextcloud_app_password | default('') | length > 0)

- name: Set rclone obscured password fact
  set_fact:
    istota_rclone_password_obscured: "{{ _istota_rclone_obscured.stdout }}"
  when: _istota_rclone_obscured is defined and _istota_rclone_obscured is not skipped
  no_log: true

- name: Deploy rclone configuration
  copy:
    dest: "{{ istota_home }}/.config/rclone/rclone.conf"
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0600"
    content: |
      [{{ istota_rclone_remote }}]
      type = webdav
      url = {{ istota_nextcloud_url }}/remote.php/dav/files/{{ istota_nextcloud_username }}/
      vendor = nextcloud
      user = {{ istota_nextcloud_username }}
      pass = {{ istota_rclone_password_obscured }}
  when: not istota_update_only and not istota_web_only and istota_configure_rclone

# rclone mount — inlined (replace with a dedicated role if you prefer)
- name: Create Nextcloud mount point
  file:
    path: "{{ istota_nextcloud_mount_path }}"
    state: directory
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0755"
  when: not istota_update_only and not istota_web_only and istota_use_nextcloud_mount

- name: Create nextcloud-mount group
  group:
    name: nextcloud-mount
    system: yes
    state: present
  when: not istota_update_only and not istota_web_only and istota_use_nextcloud_mount

- name: Add istota user to nextcloud-mount group
  user:
    name: "{{ istota_user }}"
    groups: nextcloud-mount
    append: yes
  when: not istota_update_only and not istota_web_only and istota_use_nextcloud_mount

- name: Deploy rclone mount systemd service
  copy:
    dest: /etc/systemd/system/mount-nextcloud.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Nextcloud rclone FUSE mount
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User={{ istota_user }}
      Group={{ istota_group }}
      ExecStartPre=/bin/mkdir -p {{ istota_nextcloud_mount_path }}
      ExecStart=/usr/bin/rclone mount \
        --config {{ istota_home }}/.config/rclone/rclone.conf \
        --allow-other \
        --vfs-cache-mode full \
        --vfs-cache-max-age 1h \
        --dir-cache-time 5s \
        --poll-interval 10s \
        {{ istota_rclone_remote }}: {{ istota_nextcloud_mount_path }}
      ExecStop=/bin/fusermount3 -u {{ istota_nextcloud_mount_path }}
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  when: not istota_update_only and not istota_web_only and istota_use_nextcloud_mount
  notify:
    - reload systemd

- name: Enable allow_other in FUSE config
  lineinfile:
    path: /etc/fuse.conf
    regexp: '^#?user_allow_other'
    line: 'user_allow_other'
  when: not istota_update_only and not istota_web_only and istota_use_nextcloud_mount

- name: Enable and start rclone mount
  systemd:
    name: mount-nextcloud
    enabled: yes
    state: started
    daemon_reload: yes
  when: not istota_update_only and not istota_web_only and istota_use_nextcloud_mount

- name: Set ownership of .config directory
  file:
    path: "{{ istota_home }}/.config"
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    recurse: yes
  when: not istota_update_only and not istota_web_only

# ============================================================
# UPDATE TASKS (always run)
# ============================================================

- name: Update Claude CLI
  shell: |
    before=$(sudo -u {{ istota_user }} HOME={{ istota_home }} claude --version 2>/dev/null)
    sudo -u {{ istota_user }} HOME={{ istota_home }} claude update 2>&1 || true
    after=$(sudo -u {{ istota_user }} HOME={{ istota_home }} claude --version 2>/dev/null)
    if [ "$before" != "$after" ]; then echo "UPDATED $before -> $after"; else echo "CURRENT $after"; fi
  register: claude_update_result
  changed_when: "'UPDATED' in claude_update_result.stdout"
  when: not istota_web_only

- name: Build authenticated repo URL
  set_fact:
    istota_repo_url_auth: "{{ istota_repo_url | regex_replace('^https://', 'https://oauth2:' + istota_gitlab_token + '@') }}"
  when: istota_gitlab_token | length > 0
  no_log: true

- name: Configure git safe.directory
  community.general.git_config:
    name: safe.directory
    value: "{{ istota_repo_dir }}"
    scope: global

- name: Clone or update istota repository (branch checkout)
  git:
    repo: "{{ istota_repo_url_auth | default(istota_repo_url) }}"
    dest: "{{ istota_repo_dir }}"
    version: "{{ istota_repo_branch }}"
    force: yes
  no_log: "{{ istota_gitlab_token | length > 0 }}"
  notify:
    - "restart istota-scheduler"
    - "restart istota-browser"
    - "restart istota-web"
    - "restart istota-webhooks"

- name: Resolve and checkout tag
  block:
    - name: Fetch tags
      command: git fetch origin --tags
      args:
        chdir: "{{ istota_repo_dir }}"
      changed_when: false

    - name: Resolve latest semver tag
      shell: git tag -l 'v*' --sort=-v:refname | head -1
      args:
        chdir: "{{ istota_repo_dir }}"
      register: _istota_latest_tag
      changed_when: false
      when: istota_repo_tag == "latest"

    - name: Set resolved tag version
      set_fact:
        _istota_resolved_tag: "{{ (istota_repo_tag == 'latest') | ternary(_istota_latest_tag.stdout | default(''), istota_repo_tag) }}"

    - name: Checkout tag
      command: "git checkout {{ _istota_resolved_tag }} --quiet"
      args:
        chdir: "{{ istota_repo_dir }}"
      register: tag_checkout_result
      changed_when: tag_checkout_result.rc == 0
      when: _istota_resolved_tag | length > 0
      notify:
        - "restart istota-scheduler"
        - "restart istota-browser"
        - "restart istota-web"
        - "restart istota-webhooks"

    - name: Warn if no tags found
      debug:
        msg: "No semver tags found in repository, staying on branch {{ istota_repo_branch }}"
      when: _istota_resolved_tag | length == 0
  when: istota_repo_tag | length > 0

- name: Set ownership of src directory
  file:
    path: "{{ istota_repo_dir }}"
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    recurse: yes

- name: Install Python dependencies with uv
  command: >
    uv sync
    {% if istota_install_all_extras | default(true) %}--extra all
    {% else %}
    {% if istota_memory_search_enabled %}--extra memory-search{% endif %}
    {% if istota_whisper_enabled %}--extra whisper{% endif %}
    {% if istota_location_enabled | default(false) %}--extra location{% endif %}
    {% if istota_web_enabled | default(false) %}--extra web{% endif %}
    {% endif %}
  args:
    chdir: "{{ istota_repo_dir }}"
  environment:
    PATH: "/root/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  changed_when: false
  when: not istota_web_only

- name: Set ownership of venv directory
  file:
    path: "{{ istota_repo_dir }}/.venv"
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    recurse: yes
  when: not istota_web_only

- name: Install web UI dependencies
  command: npm ci
  args:
    chdir: "{{ istota_repo_dir }}/web"
  when: istota_web_enabled | default(false)
  changed_when: false

- name: Build web UI
  command: npm run build
  args:
    chdir: "{{ istota_repo_dir }}/web"
  when: istota_web_enabled | default(false)
  changed_when: false
  notify:
    - "restart istota-web"

- name: Set ownership of web build directory
  file:
    path: "{{ istota_repo_dir }}/web"
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    recurse: yes
  when: istota_web_enabled | default(false)

- name: Pre-download Whisper model
  shell: >
    sudo -u {{ istota_user }} HOME={{ istota_home }}
    {{ istota_repo_dir }}/.venv/bin/python -m {{ istota_package }}.skills.whisper download {{ istota_whisper_model }}
  args:
    chdir: "{{ istota_repo_dir }}"
  when: istota_whisper_enabled and not istota_web_only
  changed_when: false

- name: Create symlink for venv in home directory
  file:
    src: "{{ istota_repo_dir }}/.venv"
    dest: "{{ istota_home }}/.venv"
    state: link
    force: yes
    follow: no
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
  when: not istota_web_only

- name: Remove old config symlink if present
  file:
    path: "{{ istota_repo_dir }}/config/config.toml"
    state: absent
  when: not istota_web_only

- name: Remove old separate config directory
  file:
    path: "{{ istota_home }}/config"
    state: absent
  when: not istota_web_only

- name: "Ensure /etc/{{ istota_namespace }} directory exists"
  file:
    path: "/etc/{{ istota_namespace }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: not istota_web_only

- name: Deploy admin users file
  template:
    src: admins.j2
    dest: "/etc/{{ istota_namespace }}/admins"
    owner: root
    group: root
    mode: '0644'
  when: not istota_web_only
  notify:
    - "restart istota-scheduler"

- name: Compute money-enabled users (those with a money resource carrying monarch credentials)
  set_fact:
    _istota_money_users: >-
      {{ istota_users | dict2items
         | selectattr('value.resources', 'defined')
         | selectattr('value.resources', 'iterable')
         | rejectattr('value.resources', 'equalto', [])
         | list }}
  when: not istota_web_only

- name: Ensure per-user money secrets directory
  file:
    path: "/etc/{{ istota_namespace }}/secrets/{{ item.key }}"
    state: directory
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0750"
  loop: "{{ _istota_money_users | default([]) }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - not istota_web_only
    - (item.value.resources
       | selectattr('type', 'in', ['money', 'moneyman'])
       | selectattr('monarch_session_token', 'defined')
       | list) | length > 0

- name: Deploy per-user money secrets
  template:
    src: money-secrets.toml.j2
    dest: "/etc/{{ istota_namespace }}/secrets/{{ item.key }}/money.toml"
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0600"
  loop: "{{ _istota_money_users | default([]) }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - not istota_web_only
    - (item.value.resources
       | selectattr('type', 'in', ['money', 'moneyman'])
       | selectattr('monarch_session_token', 'defined')
       | list) | length > 0
  notify:
    - "restart istota-scheduler"
    - "restart istota-web"

- name: Remove obsolete per-user moneyman.toml secrets file
  file:
    path: "/etc/{{ istota_namespace }}/secrets/{{ item.key }}/moneyman.toml"
    state: absent
  loop: "{{ _istota_money_users | default([]) }}"
  loop_control:
    label: "{{ item.key }}"
  when: not istota_web_only

# Money workspace bootstrap. For each user with a [[resources]] type =
# "money" entry we ensure {data_dir}/{config,data,ledgers,invoices/{work,
# generated}} exist on the Nextcloud mount, and seed an empty
# .beancount file for each declared ledger name (without overwriting an
# existing one). data_dir defaults to {nextcloud_mount}/Users/{user}/
# {namespace}/money but can be overridden on the resource.

- name: Ensure money workspace data_dir
  file:
    path: "{{ _money_data_dir }}"
    state: directory
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0750"
  loop: "{{ _istota_money_users | default([]) }}"
  loop_control:
    label: "{{ item.key }}"
  vars:
    _money_resource: "{{ (item.value.resources | selectattr('type', 'in', ['money', 'moneyman']) | list | first | default(none)) }}"
    _money_data_dir: "{{ _money_resource.data_dir | default(istota_nextcloud_mount_path + '/Users/' + item.key + '/' + istota_namespace + '/money') }}"
  when:
    - istota_use_nextcloud_mount
    - not istota_web_only
    - _money_resource is not none

- name: Ensure money workspace subdirs
  file:
    path: "{{ _money_data_dir }}/{{ item.1 }}"
    state: directory
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0750"
  loop: "{{ (_istota_money_users | default([])) | product(['config', 'data', 'ledgers', 'invoices', 'invoices/work', 'invoices/generated']) | list }}"
  loop_control:
    label: "{{ item.0.key }}: {{ item.1 }}"
  vars:
    _money_resource: "{{ (item.0.value.resources | selectattr('type', 'in', ['money', 'moneyman']) | list | first | default(none)) }}"
    _money_data_dir: "{{ _money_resource.data_dir | default(istota_nextcloud_mount_path + '/Users/' + item.0.key + '/' + istota_namespace + '/money') }}"
  when:
    - istota_use_nextcloud_mount
    - not istota_web_only
    - _money_resource is not none

- name: Plan money ledger files to seed
  set_fact:
    _money_ledger_targets: "{{ _money_ledger_targets_json | from_json }}"
  vars:
    _money_ledger_targets_json: |-
      {%- set ns = namespace(out=[]) -%}
      {%- for u in (_istota_money_users | default([])) -%}
      {%- set mr = u.value.resources | selectattr('type', 'in', ['money', 'moneyman']) | list | first | default(none) -%}
      {%- if mr -%}
      {%- set ddir = mr.data_dir | default(istota_nextcloud_mount_path + '/Users/' + u.key + '/' + istota_namespace + '/money') -%}
      {%- for l in mr.ledgers | default([]) -%}
      {%- set lname = l if l is string else l.name -%}
      {%- set _ = ns.out.append({'user': u.key, 'name': lname, 'path': ddir + '/ledgers/' + lname + '.beancount'}) -%}
      {%- endfor -%}
      {%- endif -%}
      {%- endfor -%}
      {{ ns.out | to_json }}
  when:
    - istota_use_nextcloud_mount
    - not istota_web_only

- name: Seed empty money ledger files (does not overwrite existing)
  copy:
    dest: "{{ item.path }}"
    content: |
      ;; Beancount ledger — managed by you.
      ;; Money does not modify this file directly except via sync/import
      ;; staging files in ./imports/.
    force: no
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0640"
  loop: "{{ _money_ledger_targets | default([]) }}"
  loop_control:
    label: "{{ item.user }}: {{ item.name }}"
  when:
    - istota_use_nextcloud_mount
    - not istota_web_only

- name: Deploy secrets environment file
  template:
    src: secrets.env.j2
    dest: "/etc/{{ istota_namespace }}/secrets.env"
    owner: root
    group: "{{ istota_group }}"
    mode: '0640'
  when: istota_use_environment_file | default(false) and not istota_web_only
  notify:
    - "restart istota-scheduler"
    - "restart istota-web"

- name: Remove secrets environment file when not using environment file
  file:
    path: "/etc/{{ istota_namespace }}/secrets.env"
    state: absent
  when: not istota_use_environment_file | default(false) and not istota_web_only

- name: Deploy istota configuration
  template:
    src: config.toml.j2
    dest: "{{ istota_repo_dir }}/config/config.toml"
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: '0600'
  when: not istota_web_only
  notify:
    - "restart istota-scheduler"
    - "restart istota-web"

- name: Deploy per-user config files
  template:
    src: user.toml.j2
    dest: "{{ istota_repo_dir }}/config/users/{{ user_id }}.toml"
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: '0600'
  loop: "{{ istota_users | dict2items }}"
  loop_control:
    loop_var: user_item
  vars:
    user_id: "{{ user_item.key }}"
    user_config: "{{ user_item.value }}"
  when: not istota_web_only
  notify:
    - "restart istota-scheduler"

- name: Initialize/migrate database schema
  command: "{{ istota_home }}/.venv/bin/python -c \"from pathlib import Path; import sys; sys.path.insert(0, 'src'); from {{ istota_package }}.db import init_db; init_db(Path('{{ istota_home }}/data/{{ istota_namespace }}.db'))\""
  args:
    chdir: "{{ istota_repo_dir }}"
  changed_when: false  # Schema uses CREATE TABLE IF NOT EXISTS, always safe to run
  when: not istota_web_only

- name: Apply database migrations
  shell: |
    sqlite3 "{{ istota_home }}/data/{{ istota_namespace }}.db" "ALTER TABLE processed_emails ADD COLUMN \"references\" TEXT;" 2>/dev/null || true
    sqlite3 "{{ istota_home }}/data/{{ istota_namespace }}.db" "ALTER TABLE tasks ADD COLUMN output_target TEXT;" 2>/dev/null || true
    sqlite3 "{{ istota_home }}/data/{{ istota_namespace }}.db" "ALTER TABLE scheduled_jobs ADD COLUMN output_target TEXT;" 2>/dev/null || true
  changed_when: false  # Idempotent - silently fails if column already exists
  when: not istota_web_only

- name: Set ownership of database
  file:
    path: "{{ istota_home }}/data/{{ istota_namespace }}.db"
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
  when: not ansible_check_mode and not istota_web_only

- name: Deploy istota-scheduler systemd service
  template:
    src: istota-scheduler.service.j2
    dest: "/etc/systemd/system/{{ istota_namespace }}-scheduler.service"
    mode: '0644'
  when: not istota_web_only
  notify:
    - reload systemd
    - "restart istota-scheduler"

- name: Stop and disable istota-webhook service (no longer needed)
  systemd:
    name: "{{ istota_namespace }}-webhook"
    enabled: no
    state: stopped
  failed_when: false
  when: not istota_web_only

- name: Remove old istota-webhook systemd service file
  file:
    path: "/etc/systemd/system/{{ istota_namespace }}-webhook.service"
    state: absent
  when: not istota_web_only
  notify:
    - reload systemd

- name: Deploy browser container docker-compose
  template:
    src: docker-compose.browser.yml.j2
    dest: "{{ istota_home }}/docker-compose.browser.yml"
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0644"
  when: istota_browser_enabled and not istota_web_only
  notify:
    - "restart istota-browser"

- name: Deploy browser environment file
  copy:
    dest: "{{ istota_home }}/browser.env"
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0600"
    content: |
      VNC_PASSWORD={{ istota_browser_vnc_password }}
      BROWSER_VNC_URL={{ istota_browser_vnc_external_url }}
      MAX_BROWSER_SESSIONS={{ istota_browser_max_sessions }}
  when: istota_browser_enabled and not istota_web_only
  notify:
    - "restart istota-browser"

- name: Check if browser container is running
  shell: "docker ps -q -f name=istota-browser"
  register: browser_running
  changed_when: false
  when: istota_browser_enabled and not istota_web_only

- name: Start browser container if not running
  shell: docker compose -f docker-compose.browser.yml up -d --build
  args:
    chdir: "{{ istota_home }}"
  when: istota_browser_enabled and not istota_web_only and browser_running.stdout == ""

- name: Check if browser compose file exists
  stat:
    path: "{{ istota_home }}/docker-compose.browser.yml"
  register: browser_compose_file
  when: not istota_browser_enabled and not istota_web_only

- name: Stop and remove browser container when disabled
  shell: docker compose -f docker-compose.browser.yml down --rmi local
  args:
    chdir: "{{ istota_home }}"
  when: not istota_browser_enabled and not istota_web_only and (browser_compose_file.stat.exists | default(false))
  failed_when: false

- name: Remove browser files when disabled
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ istota_home }}/docker-compose.browser.yml"
    - "{{ istota_home }}/browser.env"
  when: not istota_browser_enabled and not istota_web_only

- name: Deploy browser health check cron
  template:
    src: istota-browser-health.cron.j2
    dest: "/etc/cron.d/{{ istota_namespace }}-browser-health"
    owner: root
    group: root
    mode: "0644"
  when: istota_browser_enabled and not istota_web_only

- name: Remove browser health check cron when disabled
  file:
    path: "/etc/cron.d/{{ istota_namespace }}-browser-health"
    state: absent
  when: not istota_browser_enabled and not istota_web_only

# ============================================================
# WEBHOOK RECEIVER (location tracking, etc.)
# ============================================================

- name: Deploy webhook receiver service
  template:
    src: istota-webhooks.service.j2
    dest: "/etc/systemd/system/{{ istota_namespace }}-webhooks.service"
    mode: '0644'
  when: istota_location_enabled | default(false) and not istota_web_only
  notify:
    - reload systemd
    - "restart istota-webhooks"

- name: Enable and start webhook receiver
  systemd:
    name: "{{ istota_namespace }}-webhooks"
    enabled: yes
    state: started
    daemon_reload: yes
  when: istota_location_enabled | default(false) and not istota_web_only

- name: Stop and disable old location service (migration)
  systemd:
    name: "{{ istota_namespace }}-location"
    enabled: no
    state: stopped
  failed_when: false
  when: not istota_web_only

- name: Remove old location service file (migration)
  file:
    path: "/etc/systemd/system/{{ istota_namespace }}-location.service"
    state: absent
  when: not istota_web_only
  notify:
    - reload systemd

- name: Find existing webhooks service
  stat:
    path: "/etc/systemd/system/{{ istota_namespace }}-webhooks.service"
  register: webhooks_service_file
  when: not (istota_location_enabled | default(false)) and not istota_web_only

- name: Stop and disable webhook receiver when disabled
  systemd:
    name: "{{ istota_namespace }}-webhooks"
    enabled: no
    state: stopped
  when: not (istota_location_enabled | default(false)) and not istota_web_only and (webhooks_service_file.stat.exists | default(false))
  failed_when: false

- name: Remove webhooks service file when disabled
  file:
    path: "/etc/systemd/system/{{ istota_namespace }}-webhooks.service"
    state: absent
  when: not (istota_location_enabled | default(false)) and not istota_web_only and (webhooks_service_file.stat.exists | default(false))
  notify:
    - reload systemd

# ============================================================
# WEB INTERFACE (authenticated OIDC)
# ============================================================

- name: Deploy web interface service
  template:
    src: istota-web.service.j2
    dest: "/etc/systemd/system/{{ istota_namespace }}-web.service"
    mode: '0644'
  when: istota_web_enabled | default(false) and not istota_web_only
  notify:
    - reload systemd
    - "restart istota-web"

- name: Enable and start web interface
  systemd:
    name: "{{ istota_namespace }}-web"
    enabled: yes
    state: started
    daemon_reload: yes
  when: istota_web_enabled | default(false) and not istota_web_only

- name: Restart web interface (web-only mode)
  systemd:
    name: "{{ istota_namespace }}-web"
    state: restarted
  when: istota_web_only and (istota_web_enabled | default(false))

- name: Find existing web service
  stat:
    path: "/etc/systemd/system/{{ istota_namespace }}-web.service"
  register: web_service_file
  when: not (istota_web_enabled | default(false)) and not istota_web_only

- name: Stop and disable web interface when disabled
  systemd:
    name: "{{ istota_namespace }}-web"
    enabled: no
    state: stopped
  when: not (istota_web_enabled | default(false)) and not istota_web_only and (web_service_file.stat.exists | default(false))
  failed_when: false

- name: Remove web service file when disabled
  file:
    path: "/etc/systemd/system/{{ istota_namespace }}-web.service"
    state: absent
  when: not (istota_web_enabled | default(false)) and not istota_web_only and (web_service_file.stat.exists | default(false))
  notify:
    - reload systemd

# ============================================================
# BACKUP TASKS
# ============================================================

- name: Create local backup directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0755"
  loop:
    - "{{ istota_backup_local_dir }}"
    - "{{ istota_backup_local_dir }}/daily"
    - "{{ istota_backup_local_dir }}/weekly"
  when: istota_backup_enabled and not istota_web_only

- name: Create remote backup directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0755"
  loop:
    - "{{ istota_backup_remote_dir }}"
    - "{{ istota_backup_remote_dir }}/db"
    - "{{ istota_backup_remote_dir }}/db/daily"
    - "{{ istota_backup_remote_dir }}/db/weekly"
  when: istota_backup_enabled and istota_use_nextcloud_mount and not istota_web_only

- name: Deploy istota backup script
  template:
    src: istota-backup.sh.j2
    dest: "/usr/local/bin/{{ istota_namespace }}-backup.sh"
    owner: root
    group: root
    mode: "0755"
  when: istota_backup_enabled and not istota_web_only

- name: Deploy istota backup cron
  template:
    src: istota-backup.cron.j2
    dest: "/etc/cron.d/{{ istota_namespace }}-backup"
    owner: root
    group: root
    mode: "0644"
  when: istota_backup_enabled and not istota_web_only

- name: Remove backup script when backups disabled
  file:
    path: "/usr/local/bin/{{ istota_namespace }}-backup.sh"
    state: absent
  when: not istota_backup_enabled and not istota_web_only

- name: Remove backup cron when backups disabled
  file:
    path: "/etc/cron.d/{{ istota_namespace }}-backup"
    state: absent
  when: not istota_backup_enabled and not istota_web_only

# ============================================================
# AUTO-UPDATE (poor man's CI)
# ============================================================

- name: Deploy auto-update script
  template:
    src: istota-update.sh.j2
    dest: "/usr/local/bin/{{ istota_namespace }}-update.sh"
    owner: root
    group: root
    mode: "0755"
  when: istota_auto_update_enabled and not istota_web_only

- name: Deploy auto-update cron
  template:
    src: istota-update.cron.j2
    dest: "/etc/cron.d/{{ istota_namespace }}-update"
    owner: root
    group: root
    mode: "0644"
  when: istota_auto_update_enabled and not istota_web_only

- name: Remove auto-update script when disabled
  file:
    path: "/usr/local/bin/{{ istota_namespace }}-update.sh"
    state: absent
  when: not istota_auto_update_enabled and not istota_web_only

- name: Remove auto-update cron when disabled
  file:
    path: "/etc/cron.d/{{ istota_namespace }}-update"
    state: absent
  when: not istota_auto_update_enabled and not istota_web_only

# ============================================================
# LEDGER BACKUP DIRECTORIES (for auto-append rotating backups)
# ============================================================

- name: Create ledger backup directories
  file:
    path: "{{ (istota_nextcloud_mount_path + '/' + item.1.path | regex_replace('^/', '')) | dirname }}/backups"
    state: directory
    owner: "{{ istota_user }}"
    group: "{{ istota_group }}"
    mode: "0755"
  loop: >-
    {{ istota_users | dict2items
       | selectattr('value.resources', 'defined')
       | subelements('value.resources')
       | selectattr('1.type', 'equalto', 'ledger')
       | list }}
  loop_control:
    label: "{{ item.0.key }} - {{ item.1.path | dirname }}/backups"
  when: istota_use_nextcloud_mount and not istota_web_only

# ============================================================
# NGINX SITE HOSTING
# ============================================================

# nginx — inlined (replace with a dedicated role if you prefer)
- name: Install nginx
  apt:
    name: nginx
    state: present
  when: (istota_site_enabled or istota_location_enabled | default(false) or istota_web_enabled | default(false)) and not istota_update_only and not istota_web_only

- name: Build list of site users
  set_fact:
    _istota_site_users: >-
      {{ istota_users | dict2items
         | selectattr('value.site_enabled', 'defined')
         | selectattr('value.site_enabled', 'equalto', true)
         | list }}
  when: not istota_web_only

- name: Create site root html directory
  file:
    path: "{{ istota_home }}/html"
    state: directory
    owner: "{{ istota_user }}"
    group: www-data
    mode: "0755"
  when: istota_site_enabled and not istota_web_only

- name: Deploy default index.html for site root
  template:
    src: index.html.j2
    dest: "{{ istota_home }}/html/index.html"
    owner: "{{ istota_user }}"
    group: www-data
    mode: "0644"
    force: no
  when: istota_site_enabled and not istota_web_only

- name: Create per-user html directories
  file:
    path: "{{ istota_nextcloud_mount_path }}/Users/{{ item.key }}/{{ istota_namespace }}/html"
    state: directory
    owner: "{{ istota_user }}"
    group: www-data
    mode: "0755"
  loop: "{{ _istota_site_users | default([]) }}"
  loop_control:
    label: "{{ item.key }}"
  when: istota_site_enabled and not istota_web_only

- name: Deploy default index.html for site users
  template:
    src: user-index.html.j2
    dest: "{{ istota_nextcloud_mount_path }}/Users/{{ item.key }}/{{ istota_namespace }}/html/index.html"
    owner: "{{ istota_user }}"
    group: www-data
    mode: "0644"
    force: no
  loop: "{{ _istota_site_users | default([]) }}"
  loop_control:
    label: "{{ item.key }}"
  when: istota_site_enabled and not istota_web_only

- name: Remove obsolete moneyman nginx include
  file:
    path: /etc/nginx/includes/moneyman-web.inc
    state: absent
  when: not istota_web_only

- name: Deploy nginx config
  template:
    src: istota.conf.j2
    dest: "/etc/nginx/conf.d/{{ istota_hostname }}.conf"
    owner: root
    group: root
    mode: "0644"
  when: (istota_site_enabled or istota_location_enabled | default(false) or istota_web_enabled | default(false)) and not istota_web_only
  notify:
    - reload nginx

- name: Remove nginx config when all features disabled
  file:
    path: "/etc/nginx/conf.d/{{ istota_hostname }}.conf"
    state: absent
  when: not istota_site_enabled and not (istota_location_enabled | default(false)) and not (istota_web_enabled | default(false)) and not istota_web_only
  notify:
    - reload nginx

- name: Force handlers to run now
  meta: flush_handlers
  when: not istota_web_only

- name: "Enable and start istota-scheduler"
  systemd:
    name: "{{ istota_namespace }}-scheduler"
    enabled: yes
    state: started
    daemon_reload: yes
  when: not istota_web_only

- name: Display deployment info
  debug:
    msg:
      - "{{ istota_namespace | capitalize }} has been deployed to {{ istota_home }}"
      - "Scheduler daemon handles all polling (Talk, email, TASKS.md)"
      - "Service: {{ istota_namespace }}-scheduler"
      - "Logs: journalctl -u {{ istota_namespace }}-scheduler -f"
  when: not istota_web_only
