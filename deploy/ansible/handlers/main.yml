---
- name: reload systemd
  systemd:
    daemon_reload: yes
  when: not istota_web_only

- name: "restart istota-scheduler"
  systemd:
    name: "{{ istota_namespace }}-scheduler"
    state: restarted
  when: not istota_web_only

- name: "restart istota-browser"
  shell: docker compose -f docker-compose.browser.yml build && docker compose -f docker-compose.browser.yml up -d --force-recreate
  args:
    chdir: "{{ istota_home }}"
  when: istota_browser_enabled and not istota_web_only

- name: "restart istota-devbox"
  shell: docker compose -f docker-compose.devbox.yml build && docker compose -f docker-compose.devbox.yml up -d --force-recreate
  args:
    chdir: "{{ istota_home }}"
  when: istota_devbox_enabled and not istota_web_only and (istota_devbox_users | length > 0)

- name: "save iptables (devbox)"
  # Persist the DOCKER-USER rules so they survive host reboots. On Debian /
  # Ubuntu, iptables-persistent reads from /etc/iptables/rules.v4 — netfilter-
  # persistent save writes the live ruleset to that file.
  command: netfilter-persistent save
  when: not istota_web_only
  failed_when: false

- name: "restart istota-web"
  systemd:
    name: "{{ istota_namespace }}-web"
    state: restarted
  when: istota_web_enabled | default(false)

- name: "restart istota-webhooks"
  systemd:
    name: "{{ istota_namespace }}-webhooks"
    state: restarted
  when: istota_location_enabled | default(false)

- name: reload nginx
  systemd:
    name: nginx
    state: reloaded

- name: restart nginx
  systemd:
    name: nginx
    state: restarted
