---
# Istota deployment defaults

# Namespace - sets all downstream defaults (user, group, paths, services, etc.)
# Override individual variables below to diverge from namespace where needed
istota_namespace: "istota"

# Python package name - always "istota" regardless of namespace
# Used for Python module imports (python -m istota.scheduler, from istota.db, etc.)
# Env vars are not derived from this; they always use the literal ISTOTA_ prefix
# (e.g. ISTOTA_DEVELOPER_GITLAB_TOKEN). See deploy/ansible/templates/secrets.env.j2.
istota_package: "istota"

# Update mode - skip full installation, just pull code and update config
# Usage: ansible-playbook playbook.yml -e "istota_update_only=true"
istota_update_only: false

# Web-only mode - just pull code, rebuild web UI, restart web service
# Usage: ansible-playbook playbook.yml -e "istota_web_only=true"
istota_web_only: false

# Application paths
istota_home: "/srv/app/{{ istota_namespace }}"
istota_user: "{{ istota_namespace }}"
istota_group: "{{ istota_namespace }}"

# User-facing bot identity name (display only; defaults to namespace capitalized)
istota_bot_name: ""
# Include emissaries.md (constitutional principles) in system prompts
istota_emissaries_enabled: true
# =============================================================================
# Model selection — three knobs that interact
# =============================================================================
# istota_model + istota_effort   set the *default* model/effort for every task
#                                 (cron jobs, briefings, talk, email, ...). Both
#                                 are read independently — see the footgun below.
# istota_models_roles            operator-rebound role aliases (smart/general/
#                                 fast and custom roles). Affects anything
#                                 that resolves a name through the active brain.
#
# Resolution chain inside the codebase:
#   1. Per-task overrides (`!model <alias> <prompt>` from Talk) win over
#      everything else — both model and effort are stored on the task row.
#   2. Otherwise: istota_model + istota_effort.
#   3. Otherwise: brain default (the CLI picks).
#
# FOOTGUN — provider-alias effort is NOT auto-applied via istota_model:
#   istota_model: "opus-46-high"  resolves model → claude-opus-4-6, but
#                                 istota_effort stays "" (= medium default).
#   To get Opus 4.6 + high effort as the global default you MUST set both:
#     istota_model: "opus-46-high"
#     istota_effort: "high"
#   (or equivalently, `claude-opus-4-6` + `high`).
#   The Talk-side `!model opus-46-high <prompt>` path encodes both — only
#   Ansible/TOML config has this split, because the two fields predate
#   provider aliases.
# =============================================================================

# Default Claude model for every task. Accepts:
#   - canonical IDs            "claude-opus-4-7", "claude-opus-4-6"
#   - provider aliases         "opus", "opus-high", "opus-46-high", "sonnet", "haiku"
#   - role aliases             "smart" (→ Opus 4.7), "general" (→ Sonnet),
#                              "fast" (→ Haiku), or any custom role you define
#                              in istota_models_roles
# Empty = brain default.
istota_model: ""
# Default effort level (Opus 4.7, Opus 4.6, Sonnet 4.6 only): low, medium, high,
# xhigh (Opus 4.7 only), max (Opus 4.7 only). Empty = model default.
# Read independently of istota_model — see footgun above.
istota_effort: ""

# Role aliases — provider-agnostic names that resolve to specific model IDs.
# Defaults (in code, brain.claude_code.DEFAULT_ROLE_TARGETS):
#   fast    → claude-haiku-4-5
#   general → claude-sonnet-4-6
#   smart   → claude-opus-4-7
# These are the names internal call sites use when they need to pick a model
# for a sub-job (e.g. context triage uses "fast", sleep cycle uses "general").
# `smart` is currently UNUSED by internal code — it exists for `!model smart`
# from Talk and as a sensible default for any future code path that wants
# "the best model".
#
# Override here to rebind a role for this deployment, e.g.:
#   istota_models_roles:
#     smart: opus-46-high   # rebind the user-facing "smart" alias to Opus 4.6
#     deep:  opus-max       # define a custom role available via !model deep
#     fast:  haiku          # explicit (matches default; cosmetic only)
# Values may be canonical IDs or any provider alias from MODEL_ALIASES in the
# active brain module (resolved at config-load time; the active brain
# validates overrides on startup and warns on typos / collisions). Empty
# dict = use code defaults. Operator-defined custom roles are also accepted
# and surface via `!models` Talk command.
#
# NOTE: role aliases never carry effort — `[models.roles] smart = "opus-46-high"`
# resolves "smart" to model claude-opus-4-6 only; effort stays at istota_effort
# unless the user types `!model opus-46-high <prompt>` directly.
istota_models_roles: {}
# Use config/system-prompt.md instead of Claude Code's default system prompt
istota_custom_system_prompt: true

# Brain — selects which model-invocation backend the executor uses.
#   "claude_code" (default) wraps the `claude` CLI subprocess.
#   "native"                runs istota's own in-process agent loop against an
#                           OpenAI-compatible (or Claude-CLI) provider.
# Both coexist behind the Brain protocol (src/istota/brain/); swapping backends
# doesn't touch executor orchestration (memory, skills, sandbox, deferred DB
# writes). Full operator runbook: docs/configuration/native-brain.md.
istota_brain_kind: "claude_code"

# --- Native brain ([brain.native]) -------------------------------------------
# Only emitted to config.toml when istota_brain_kind == "native" OR a
# source_type_overrides entry routes some task type to "native". Defaults match
# the code defaults (NativeBrainConfig), so most operators only set model +
# base_url + the API key.
istota_brain_native_provider: "openai_compat"     # only provider currently
istota_brain_native_model: ""                     # explicit id (openai_compat has no aliasing)
istota_brain_native_effort: ""                    # default effort: low/medium/high/xhigh/max ("" = none).
                                                  #   Sent as reasoning_effort only to a thinking-capable
                                                  #   model; xhigh/max fold to high over the compat endpoint.
istota_brain_native_base_url: "https://api.anthropic.com/v1"
istota_brain_native_extra_headers: {}             # dict of extra HTTP headers (openai_compat)
istota_brain_native_context_window: 0             # 0 = resolve from bundled model catalog
istota_brain_native_max_turns: 100                # hard cap on assistant turns per task
istota_brain_native_max_tokens: 16384             # per-completion output cap
istota_brain_native_prompt_caching: ""            # cache_control breakpoints. "" = derive from base_url
                                                  #   (ON for api.anthropic.com, OFF otherwise). Set true/false
                                                  #   to force; a plain-OpenAI / local endpoint needs false.
# Per-role model overrides for the native brain. Internal subsystems request
# models by role (fast = conversation selection / routing; general = sleep-cycle
# extraction, OCR; smart = !model smart / heavy work). Each defaults to
# istota_brain_native_model; set one to point a role at a different model on the
# SAME endpoint (e.g. a bigger model for "smart"). All three render into
# [models.roles]. For custom roles beyond these three, use istota_models_roles.
istota_brain_native_model_fast: ""                # "" → istota_brain_native_model
istota_brain_native_model_general: ""             # "" → istota_brain_native_model
istota_brain_native_model_smart: ""               # "" → istota_brain_native_model
# Instance-wide provider API key. Never written to config.toml — rendered into
# the EnvironmentFile as ISTOTA_BRAIN_NATIVE_API_KEY (or set it there directly).
# Vault this. Per-user keys go through istota_user_secrets (service:
# native_brain, key: api_key) instead, and overlay this instance key per user.
istota_brain_native_api_key: ""

# --- Per-source-type brain routing ([brain.source_type_overrides]) -----------
# Gradual-rollout knob: map a task source_type to a brain kind, overriding
# istota_brain_kind for matching tasks (e.g. move cron/heartbeat to native while
# interactive talk/email stays on claude_code). Unknown kinds are logged and
# ignored, never wedging a task. Example:
#   istota_brain_source_type_overrides:
#     scheduled: native
#     heartbeat: native
istota_brain_source_type_overrides: {}

# Claude CLI authentication
# Preferred: generate a token locally with `claude setup-token`, store in vault
# Fallback: authenticate manually with `sudo -u <namespace> claude login`
istota_claude_code_oauth_token: ""

# Git repository
istota_repo_url: "https://github.com/istota-project/istota.git"
istota_repo_branch: main
istota_repo_tag: "latest"  # "latest" = highest semver tag, "v0.2.0" = specific tag, "" = use branch
istota_repo_dir: "{{ istota_home }}/istota"

# GitLab access token used to clone the istota repo itself (for private repos).
# Generate at: GitLab > Settings > Access Tokens (read_repository scope).
# NOT the same as istota_developer_gitlab_token — that one feeds the
# developer skill's API access.
istota_repo_clone_token: ""

# Scheduler settings
istota_scheduler_poll_interval: 5
istota_scheduler_dispatch_interval: 0.5       # Sub-tick pending-task dispatch cadence (0 or >= poll_interval = legacy)
istota_scheduler_talk_poll_interval: 10       # Talk conversation polling interval
istota_scheduler_talk_poll_timeout: 30        # Talk long-poll timeout
istota_scheduler_talk_poll_wait: 2.0         # Max seconds to wait before processing fast rooms
istota_scheduler_email_poll_interval: 60
istota_scheduler_briefing_check_interval: 60
istota_scheduler_tasks_file_poll_interval: 30
istota_scheduler_shared_file_check_interval: 120  # Shared file organization check interval
istota_scheduler_heartbeat_check_interval: 60    # Heartbeat monitoring check interval
istota_scheduler_db_health_check_interval: 86400 # SQLite quick_check + REINDEX sweep (default daily)
istota_scheduler_stats_interval: 60              # scheduler_stats health line interval (0 = disabled)

# Scheduler progress / event streaming
istota_scheduler_progress_updates: true                # Show real-time progress in Talk during execution
istota_scheduler_progress_show_tool_use: true          # Emit tool_start / tool_end events
istota_scheduler_progress_show_text: false             # Emit intermediate assistant text events (noisy)
istota_scheduler_event_log_enabled: true               # Write events to the task_events table (kill-switch)
istota_scheduler_stream_text_gate_chars: 200           # Narration gate: hold streamed answer text until it crosses N chars w/o a tool call (web/REPL); 0 disables. Watch `stream_gate:` logs to tune
istota_scheduler_push_notification_threshold_seconds: 30  # Min task duration before a push notification fires
istota_scheduler_push_notification_sources: []   # source_types that trigger a completion push; empty = ntfy opt-in only
istota_scheduler_task_timeout_minutes: 30             # Kill task execution after N minutes
istota_scheduler_log_channel_show_skills: true        # Include selected skills in log channel messages

# Scheduler robustness settings
istota_scheduler_confirmation_timeout_minutes: 120  # Auto-cancel pending confirmations
istota_scheduler_stale_pending_warn_minutes: 30     # Log warnings for stale tasks
istota_scheduler_stale_pending_fail_hours: 2        # Auto-fail ancient pending tasks
istota_scheduler_max_retry_age_minutes: 60           # Don't retry stuck tasks older than this
istota_scheduler_worker_heartbeat_seconds: 60        # Running worker pings liveness this often (0 disables)
istota_scheduler_worker_stuck_minutes: 5             # Reclaim a heartbeating worker's task after this much silence
istota_scheduler_task_retention_days: 7             # Delete old completed tasks
istota_scheduler_email_retention_days: 7            # Delete old emails from IMAP (0 to disable)
istota_scheduler_worker_idle_timeout: 10           # Cumulative-idle seconds a worker lingers (re-checking) before exiting
istota_scheduler_worker_idle_poll_interval: 0.5    # Idle re-check cadence (0 or >= worker_idle_timeout = legacy single wait)
istota_scheduler_max_foreground_workers: 5         # Instance-level foreground (interactive) worker cap
istota_scheduler_max_background_workers: 3         # Instance-level background (scheduled/briefing) worker cap
istota_scheduler_user_max_foreground_workers: 2    # Global per-user fg worker default
istota_scheduler_user_max_background_workers: 1    # Global per-user bg worker default
istota_scheduler_scheduled_job_max_consecutive_failures: 5  # Auto-disable after N failures (0=never)
istota_scheduler_cron_max_staleness_minutes: 60             # Skip cron-driven catch-up fires older than this (jobs + briefings); 0 = legacy unconditional catch-up
istota_scheduler_max_subtasks_per_task: 10                  # Cap deferred subtasks created per task
istota_scheduler_max_subtask_depth: 3                       # Max subtask chain depth (0=unlimited)
istota_scheduler_max_subtask_prompt_chars: 8000             # Skip deferred subtasks with prompts over this size (0=unlimited)
istota_scheduler_talk_cache_max_per_conversation: 200      # Max cached talk messages per conversation
istota_scheduler_temp_file_retention_days: 7               # Delete temp files older than N days (0=disable)
istota_scheduler_location_ping_retention_days: 365         # Delete location pings older than N days (0=unlimited)

# Logging settings
istota_logging_level: "INFO"                        # INFO or DEBUG
istota_logging_output: "both"                       # console, file, or both
istota_logging_file: "/var/log/{{ istota_namespace }}/{{ istota_namespace }}.log"
istota_logging_rotate: true                         # Let Python handle rotation (logrotate also configured)
istota_logging_max_size_mb: 10
istota_logging_backup_count: 5

# Nextcloud settings (required)
istota_nextcloud_url: ""
istota_nextcloud_username: "{{ istota_namespace }}"
istota_nextcloud_app_password: ""

# Talk settings (polling-based, no webhook needed)
istota_talk_enabled: true
istota_talk_bot_username: "{{ istota_namespace }}"  # Nextcloud username (to filter own messages)

# Email settings (optional)
istota_email_enabled: false
istota_email_imap_host: ""
istota_email_imap_port: 993
istota_email_imap_user: ""
istota_email_imap_password: ""
istota_email_smtp_host: ""
istota_email_smtp_port: 587
istota_email_poll_folder: "INBOX"
istota_email_bot_address: ""

# Conversation context settings
istota_conversation_enabled: true               # false = no conversation context at all
istota_conversation_lookback_count: 25           # max messages to fetch from DB/cache
istota_conversation_selection_model: "fast"      # role alias (resolves to Haiku by default); operator-overridable via istota_models_roles
istota_conversation_selection_timeout: 30.0      # timeout for triage model call
istota_conversation_skip_selection_threshold: 3  # skip triage if history <= this count
istota_conversation_use_selection: true           # false = include all fetched messages, no LLM triage
istota_conversation_always_include_recent: 10    # guaranteed recent messages before triage (only when use_selection=true)
istota_conversation_context_truncation: 0        # max chars per bot response in context (0 = unlimited)
istota_conversation_context_recency_hours: 0     # only include older messages within this time window (0 = disabled)
istota_conversation_context_min_messages: 10     # always include at least this many recent messages regardless of age
istota_conversation_previous_tasks_count: 3      # inject N recent scheduled/briefing tasks into context
istota_conversation_talk_context_limit: 100      # max messages to fetch from Talk message cache

# Admin users - users with full system access (DB, all mount paths, admin-only skills)
# Asymmetric semantics when this list is empty:
#   - Sandbox / skills / commands (Config.is_admin): all users are admin (legacy back-compat)
#   - Web admin dashboard (_user_is_web_admin): no users are admin (fails closed)
# To grant web admin access, list at least one user_id.
# Deployed as /etc/<namespace>/admins (root-owned, not editable by service user or Claude)
istota_admin_users: []

# Instance-wide disabled skills (list of skill names to exclude from selection)
# This controls prompt selection only — whether the bot considers a skill when
# building prompts. Feature flags like browser_enabled, developer_enabled, etc.
# control infrastructure (deploying containers, configuring services, setting
# env vars). Both layers are needed: a feature flag deploys the backend, while
# disabled_skills prevents the skill doc from being loaded into prompts.
# Example: ["browse", "whisper"]
istota_disabled_skills: []

# Experimental feature flags — operator opt-in for rough features that
# ship in the tree but are off by default. Not exposed in the web UI,
# not toggleable per user. Run `uv run istota experimental list` on the
# host to see the current registry. See docs/EXPERIMENTAL.md.
# Example: ["money_tax", "money_wash_sales"]
istota_experimental_features: []

# Users configuration (dict of user_id -> user config).
#
# After the modules / connected services refactor, the data model is split
# three ways:
#
#   * Profile fields           → user_profiles DB table (`istota user ensure`)
#   * Resources (paths only)   → user_resources DB table (`istota resource ensure`)
#   * Briefings                → briefing_configs DB table (`istota briefing ensure`)
#   * Tier-2 credentials       → encrypted secrets table (`istota secret ensure`,
#                                see `istota_user_secrets` below)
#   * Module opt-outs          → `disabled_modules:` list
#
# Resource types in this dict are PATH-shaped only: folder, calendar,
# todo_file, notes_folder, email_folder, reminders_file, ledger. The old
# module/credential-shaped types (feeds, money, monarch, karakeep,
# overland) are retired — they're auto-cleaned from user_resources on
# scheduler startup, and their values now live in the secrets table.
#
# Example:
# istota_users:
#   alice:
#     display_name: "Alice"
#     email_addresses:
#       - "alice@example.com"
#     # timezone is NOT set here — it's a user preference owned by the web UI /
#     # Nextcloud (seeded on first login). Setting it in inventory would clobber
#     # the user's web-set value on every deploy (ISSUE-102).
#     log_channel: ""               # Legacy Talk-room shorthand for the verbose
#                                   # execution log. For non-Talk destinations
#                                   # (email / ntfy / comma lists) set routing.log
#                                   # below instead — it wins over this field.
#     alerts_channel: ""            # Talk room token for confirmations and security alerts
#     trusted_email_senders:        # patterns for trusted email senders (plus-address gate)
#       - "*@example.com"           # domain wildcard
#       - "bob@other.com"           # exact match
#     max_foreground_workers: 2    # per-user override (0 or omit = use global default)
#     max_background_workers: 1    # per-user override (0 or omit = use global default)
#     disabled_skills: []          # per-user skill exclusion list
#     disabled_modules: []         # per-user module opt-outs; one of: feeds, money, location
#     # Purpose-keyed delivery routing (routes notifications by purpose). Each
#     # purpose maps to an output_target descriptor (talk / email / ntfy /
#     # all / talk:<room> / comma lists). Purposes: reply, alert, log, briefing,
#     # notification. When `routing:` is set, the listed purposes REPLACE the
#     # stored table on each deploy; omit `routing:` entirely to leave a web-set
#     # table untouched (same non-clobber rule as timezone, ISSUE-102).
#     routing:
#       alert: "ntfy"               # send alerts to the user's ntfy instead of Talk
#       log: "talk:room123"         # verbose execution log → any user-routable
#                                   # surface (talk / email / ntfy / comma list).
#                                   # Off unless set here or via log_channel above;
#                                   # Talk streams live, email/ntfy get one summary.
#     default_destination: "talk"   # fallback descriptor when no purpose matches;
#                                   # omit to leave the stored value (default "talk")
#     resources:
#       - type: "folder"
#         path: "/alice/Projects"
#         name: "Projects"
#         permissions: "write"
#       - type: "todo_file"
#         path: "/Users/alice/workspace/TASKS.md"
#         name: "Tasks"
#         permissions: "write"
#       - type: "ledger"
#         path: "/Users/alice/beancount/main.beancount"
#         name: "Personal"
#         permissions: "write"
#     briefings:
#       - name: "morning"
#         cron: "0 6 * * *"
#         conversation_token: "room123"
#         output: "talk,email"   # talk / email / ntfy, or a comma list
#         components:
#           calendar: true
#           todos: true
#           markets:
#             enabled: true
#           news:
#             enabled: true
#           headlines:
#             enabled: true
#           reminders:
#             enabled: true
istota_users: {}

# Per-user encrypted secrets (Karakeep, Monarch, Tumblr API key, Overland
# ingest token, ...). Each row is upserted via `istota secret ensure` and
# stored in the encrypted `secrets` table — never in plaintext on disk.
# `istota_secret_key` (above) must be set; the role exports it through the
# secrets.env file consumed by the systemd units.
#
# Schema is validated server-side; a typo in `service` or `key` fails the
# play. Known services / keys (as of the current refactor):
#
#   karakeep         base_url, api_key
#   monarch          email, password, session_token
#   feeds            tumblr_api_key
#   overland         ingest_token
#   google_workspace (OAuth-only, not provisionable from Ansible)
#
# Example:
# istota_user_secrets:
#   alice:
#     - { service: karakeep, key: base_url,     value: "https://kk.example.com" }
#     - { service: karakeep, key: api_key,      value: "{{ vault_alice_kk_token }}" }
#     - { service: monarch,  key: email,        value: "alice@example.com" }
#     - { service: monarch,  key: password,     value: "{{ vault_alice_monarch_password }}" }
#     - { service: overland, key: ingest_token, value: "{{ vault_alice_overland_token }}" }
#     - { service: feeds,    key: tumblr_api_key, value: "{{ vault_alice_tumblr_api_key }}" }
istota_user_secrets: {}

# Briefing defaults (expanded when user sets `markets = true` or `news = true`)
# markets futures/indices symbols default from markets.py — only override if needed
istota_briefing_defaults:
  news:
    lookback_hours: 12
    sources:
      - type: "domain"
        value: "semafor.com"
      - type: "domain"
        value: "bloomberg.com"
      - type: "domain"
        value: "reuters.com"
      - type: "domain"
        value: "axios.com"
      - type: "domain"
        value: "nytimes.com"
      - type: "domain"
        value: "economist.com"
  headlines:
    sources:
      - "ap"
      - "reuters"
      - "guardian"
      - "ft"
      - "aljazeera"
      - "lemonde"
      - "spiegel"

# rclone remote name for Nextcloud
istota_rclone_remote: "nextcloud"

# rclone password (must be pre-obscured with: rclone obscure <password>)
# Generate with: rclone obscure "your-app-password"
istota_rclone_password_obscured: ""

# Nextcloud mount (alternative to rclone CLI)
# When enabled, Nextcloud is mounted at istota_nextcloud_mount_path and istota uses
# direct filesystem access instead of rclone subprocess calls
istota_use_nextcloud_mount: true
istota_nextcloud_mount_path: "/srv/mount/nextcloud/content"

# Money integration. The skill is in-process — no separate service. Per-
# user Monarch credentials are stored in the encrypted secrets table; see
# `istota_user_secrets` above. Workspace layout is auto-derived from the
# user's istota workspace (data_dir = {workspace}/money, ledgers default
# to a single 'main' beancount file at {data_dir}/ledgers/main.beancount).
# Per-user `[[resources]] type = "money"` is no longer used; the loader
# synthesizes the UserContext from the workspace.

# Browser container settings (for web browsing skill)
istota_browser_enabled: false
istota_browser_api_port: 9223
istota_browser_vnc_port: 6080
istota_browser_vnc_password: ""
istota_browser_vnc_external_url: ""  # e.g. https://vnc.example.com:6080
istota_browser_max_sessions: 3
istota_browser_shm_size: "2gb"
istota_browser_cpu_limit: "{{ ansible_facts['processor_vcpus'] }}"
istota_browser_memory_limit: "3G"
istota_browser_restart_cron: "0 5 * * *"  # Daily restart (5 AM)

# Devbox container (per-user persistent dev / network-diagnostics environment).
# When enabled, one container per entry in istota_devbox_users is brought up
# via docker-compose. The skill CLI shells in over the host docker socket; the
# bwrap sandbox in executor.py bind-mounts the socket only when the [devbox]
# block is rendered into config.toml.
istota_devbox_enabled: false
istota_devbox_image: "istota-devbox:latest"
istota_devbox_container_prefix: "devbox-"
istota_devbox_docker_cli: "/usr/bin/docker"
istota_devbox_docker_socket: "/var/run/docker.sock"
istota_devbox_exec_timeout_seconds: 300
istota_devbox_max_output_bytes: 102400
istota_devbox_mem_limit: "2g"
istota_devbox_cpus: 2
istota_devbox_pids_limit: 512
istota_devbox_workspace_tmpfs_size: "1g"
istota_devbox_network_name: "{{ istota_namespace }}-devbox-net"
istota_devbox_network_subnet: "172.30.0.0/24"
# Cloud metadata endpoint blocked by default — link-local + DigitalOcean/GCP/
# AWS/Azure all rendezvous at 169.254.169.254.
istota_devbox_block_metadata: true
# RFC1918 blocking: drops outbound traffic from the devbox network targeting
# private ranges so a compromised devbox can't pivot to the host's LAN.
# Disable when you want the devbox to reach a colocated service intentionally.
istota_devbox_block_rfc1918: true
# Users whose containers should be created. Each entry is a user_id; the
# container is named "{{ istota_devbox_container_prefix }}{{ user_id }}".
istota_devbox_users: []

# Devbox credential proxy. One systemd unit per devbox user listens on
# a per-user Unix socket under /var/run/{namespace}/<user>/sock. The
# compose template bind-mounts that per-user directory into the
# container at /run/istota-cred (directory, not file — so daemon
# restarts don't strand the container against a dead inode). Container-
# side shims (gitlab-api, github-api, gh, glab, git-credential-istota)
# connect to /run/istota-cred/sock and the daemon injects the configured
# developer.{gitlab,github}_token server-side. Tokens never enter the
# container. Defaults on when devbox is on.
istota_devbox_proxy_enabled: true
istota_devbox_proxy_socket_dir: "/var/run/{{ istota_namespace }}"
# Empty string → audit lines go to the journal only. Set to an absolute
# path to also tail audit lines into a file.
istota_devbox_proxy_audit_log: ""
# Per-API call timeout, used by both the host-side developer skill and
# the devbox proxy.
istota_developer_api_timeout_seconds: 30

# ntfy push notifications are configured per-user via the encrypted secrets
# table (`istota secret ensure -s ntfy ...` or web settings). There is no
# operator-shared ntfy config — each user supplies their own server/topic/auth.

# Location tracking (Overland GPS receiver)
istota_location_enabled: false
istota_webhooks_port: 8765
istota_location_accuracy_threshold_m: 100.0
istota_location_visit_exit_minutes: 5.0
istota_location_reconcile_enabled: true
istota_location_reconcile_lookback_hours: 6.0
istota_location_reconcile_buffer_minutes: 10.0
istota_location_reconcile_grace_minutes: 10.0
istota_location_reconcile_min_pings: 3
istota_location_reconcile_min_dwell_sec: 60

# Authenticated web interface (Nextcloud built-in OAuth2)
#
# Auth-only flow against NC's built-in OAuth2 provider. Set up the client in
# Settings → Security → OAuth 2.0 clients on the target Nextcloud, then put
# the client_id/secret here (vault the secret). Redirect URI must match
# {istota_web_oauth2_redirect_uri} or the derived default
# `https://{istota_hostname}/istota/callback`.
istota_web_enabled: true
istota_web_port: 8766

istota_web_oauth2_provider: ""           # Public NC URL (what the browser hits), no trailing slash
istota_web_oauth2_client_id: ""
istota_web_oauth2_client_secret: ""
istota_web_oauth2_token_endpoint: ""     # Optional override; defaults derive from oauth2_provider
istota_web_oauth2_userinfo_endpoint: ""  # Optional override
istota_web_oauth2_redirect_uri: ""       # Optional override; defaults to https://{site_hostname}/istota/callback
istota_web_secret_key: ""                # Session signing key (vault); generate with `python3 -c 'import secrets;print(secrets.token_hex(32))'`

# Master key for the encrypted ``secrets`` table. Populated into
# /etc/{{ istota_namespace }}/secrets.env as ISTOTA_SECRET_KEY. Generate
# with: ``python3 -c "import secrets; print(secrets.token_hex(32))"`` and
# store via ansible-vault. Empty disables the secrets store; tier-2
# credentials then fall back to TOML extras only.
istota_secret_key: ""

# Google Workspace CLI integration (OAuth-based)
istota_google_workspace_enabled: false
istota_google_workspace_client_id: ""
istota_google_workspace_client_secret: ""
# Read-only by default. For full read/write access, remove .readonly suffixes:
#   drive.readonly -> drive, gmail.readonly -> gmail.modify,
#   calendar.readonly -> calendar, spreadsheets.readonly -> spreadsheets,
#   documents.readonly -> documents
# Changing scopes requires users to disconnect and reconnect their Google account.
istota_google_workspace_scopes:
  - "https://www.googleapis.com/auth/drive.readonly"
  - "https://www.googleapis.com/auth/gmail.readonly"
  - "https://www.googleapis.com/auth/calendar.readonly"
  - "https://www.googleapis.com/auth/spreadsheets.readonly"
  - "https://www.googleapis.com/auth/documents.readonly"

# Install all optional Python dependencies (--extra all)
# Set to false to use per-feature flags for fine-grained control
istota_install_all_extras: true

# Whisper audio transcription (faster-whisper CPU, int8)
istota_whisper_enabled: false
istota_whisper_model: "small"              # Model to pre-download (tiny/base/small/medium/large-v3)
istota_whisper_max_model: "small"          # Max model for auto-selection at runtime (WHISPER_MAX_MODEL)

# Memory search settings (hybrid BM25 + vector search)
istota_memory_search_enabled: true
istota_memory_search_auto_index_conversations: true
istota_memory_search_auto_index_memory_files: true
istota_memory_search_auto_recall: false           # BM25 search using task prompt as query
istota_memory_search_auto_recall_limit: 5          # max results for auto-recall
istota_memory_search_recency_half_life_days: 180   # recency decay half-life for recall (0 = off)

# Skills routing (LLM-based semantic routing for skill selection)
istota_skills_semantic_routing: true  # enable Pass 2 LLM classification

# Sleep cycle settings (nightly memory extraction, cron evaluated per-user timezone)
istota_sleep_cycle_enabled: true
istota_sleep_cycle_cron: "0 2 * * *"
istota_sleep_cycle_lookback_hours: 24
istota_sleep_cycle_memory_retention_days: 0  # 0 = unlimited
istota_sleep_cycle_auto_load_dated_days: 3   # auto-load N days of dated memories (0 = disabled)
istota_sleep_cycle_curate_user_memory: false  # nightly USER.md curation (op-based: append/add_heading/remove)
istota_sleep_cycle_curation_log_summary: true  # post one-line summary to user log_channel after applied ops
# KG audit retention is independent of memory_retention_days so default
# deployments still prune the audit table. 0 = unlimited.
istota_sleep_cycle_kg_audit_retention_days: 365

# Channel sleep cycle settings (shared channel memory extraction)
istota_channel_sleep_cycle_enabled: true
istota_channel_sleep_cycle_cron: "0 11 * * *"
istota_channel_sleep_cycle_lookback_hours: 24
istota_channel_sleep_cycle_memory_retention_days: 0  # 0 = unlimited

# Node.js (for developer skill Node.js projects)
istota_nodejs_enabled: false

# Developer skill settings (git + GitLab/GitHub workflows)
# Recommended: dedicated bot accounts with minimal required permissions
istota_developer_enabled: false
istota_developer_repos_dir: ""                    # Base directory for repo clones/worktrees
istota_developer_author_credit: ""                # Appended to every commit (e.g., "Co-Authored-By: Name <email>")
# GitLab settings
istota_developer_gitlab_url: "https://gitlab.com"
istota_developer_gitlab_token: ""                 # API token (read_api + write_repository scope)
istota_developer_gitlab_username: ""              # GitLab username for HTTPS auth
istota_developer_gitlab_default_namespace: ""     # Default namespace for short repo names
istota_developer_gitlab_reviewer_id: ""          # GitLab user ID to assign as MR reviewer
istota_developer_gitlab_api_allowlist:            # Devbox proxy strips /api/v4 into base_url; match against the bare path
  - "GET /user"
  - "GET /projects/*"
  - "GET /groups/*"
  - "GET /users*"
  - "POST /projects/*/merge_requests"
  - "POST /projects/*/merge_requests/*/notes"
  - "POST /projects/*/issues"
  - "POST /projects/*/issues/*/notes"
  - "PUT /projects/*/merge_requests/*/merge"
# GitHub settings
istota_developer_github_url: "https://github.com"
istota_developer_github_token: ""                 # Personal access token (repo scope)
istota_developer_github_username: ""              # GitHub username for HTTPS auth (defaults to x-access-token)
istota_developer_github_default_owner: ""         # Default org/user for short repo names
istota_developer_github_reviewer: ""              # GitHub username to request as PR reviewer
istota_developer_github_api_allowlist:            # API endpoint allowlist (enforced in wrapper script)
  - "GET /user"
  - "GET /repos/*"
  - "GET /orgs/*"
  - "GET /users/*"
  - "GET /search/*"
  - "POST /repos/*/pulls"
  - "POST /repos/*/pulls/*/reviews"
  - "POST /repos/*/issues"
  - "POST /repos/*/issues/*/comments"
  - "POST /repos/*/pulls/*/comments"
  - "PUT /repos/*/pulls/*/merge"
  - "PATCH /repos/*/pulls/*"
  - "PATCH /repos/*/issues/*"

# Nginx site hosting
istota_site_enabled: false
istota_site_base_path: "{{ istota_home }}/html"
# Public hostname for nginx (site hosting, webhooks, etc.)
istota_hostname: "{{ istota_namespace }}.example.com"

# Backup settings
istota_backup_enabled: true
istota_backup_local_dir: "{{ istota_home }}/data/backups"
istota_backup_remote_dir: "{{ istota_nextcloud_mount_path }}/Backups"
istota_backup_db_daily_retention: 7
istota_backup_db_weekly_retention: 4
istota_backup_db_cron: "0 */6 * * *"
istota_backup_files_cron: "0 3 * * *"
istota_backup_files_sources:
  - src: "Users"
    dest: "files/Users"
    excludes:
      - "*/shared/**"
  - src: "Channels"
    dest: "files/Channels"
istota_backup_rclone_config: "{{ istota_home }}/.config/rclone/rclone.conf"
istota_backup_rclone_remote: "{{ istota_rclone_remote }}"
istota_backup_rclone_remote_path: "Backups"
istota_backup_log: "/var/log/{{ istota_namespace }}/{{ istota_namespace }}-backup.log"

# Auto-update settings (poor man's CI)
istota_auto_update_enabled: false
istota_auto_update_cron: "*/5 * * * *"

# Whether to configure rclone automatically
istota_configure_rclone: true

# Security hardening
istota_security_sandbox_enabled: true             # bwrap filesystem isolation per user
istota_security_sandbox_admin_db_write: false     # allow admin DB writes inside sandbox
istota_security_skill_proxy_enabled: true         # proxy skill CLI calls via Unix socket (credential isolation)
istota_security_skill_proxy_timeout: 300          # timeout for proxied skill commands (seconds)
istota_security_sandbox_ro_paths:                  # extra RO bind-mounts in sandbox (co-located services)
  - /srv/app
istota_security_network_enabled: true              # --unshare-net + CONNECT proxy (requires sandbox)
istota_security_network_allow_pypi: true           # add pypi.org + files.pythonhosted.org to allowlist
istota_security_network_extra_hosts: []            # operator-specific additions
# When true, secrets are loaded from /etc/<namespace>/secrets.env via EnvironmentFile=
# and omitted from config.toml (config.py reads them from env vars)
istota_use_environment_file: true
