name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract release notes from tag annotation
        id: notes
        run: |
          NOTES=$(git tag -l --format='%(contents)' "${{ github.ref_name }}" | sed -n '/-----BEGIN PGP/q;p')
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            echo "::error::Tag ${{ github.ref_name }} has no annotation body — push it with 'git tag -a -m'"
            exit 1
          fi
          {
            echo 'NOTES<<RELEASE_NOTES_EOF'
            printf '%s\n' "$NOTES"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --notes "${{ steps.notes.outputs.NOTES }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
